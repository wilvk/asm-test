# Self-hosted hardware-trace lanes (allowed-to-be-absent).
#
# Every hardware-exact live capture path in this repo self-skips on GitHub's
# hosted pool (no AMD LbrExtV2/IBS, no bare-metal Intel PT, no CoreSight, no
# Apple Silicon, no bare-metal /dev/kvm). This workflow carries the self-hosted
# jobs that run those paths for real on registered silicon. It is designed to
# LAND AND STAY GREEN WITH ZERO RUNNERS: every job is guarded by a repo variable
# (`vars.HW_RUNNER_*`) that is `0`/absent by default, so it skips instantly
# instead of queuing forever. Registering a box and flipping one variable to `1`
# lights exactly one lane.
#
# SECURITY POSTURE (this is a constraint, not taste — see
# docs/internal/ci/runners.md): this workflow deliberately has NO `push` and NO
# `pull_request`/`pull_request_target` trigger, so fork-PR code can never reach a
# self-hosted runner. Only maintainer-driven `workflow_dispatch` and a nightly
# `schedule` (which always runs `main`) trigger it. On top of that, every
# self-hosted job carries an explicit actor guard — `github.actor ==
# github.repository_owner` in its `if:` — so the job only executes for a trigger
# initiated by the repo owner; anyone else's dispatch (or a schedule attributed to
# another actor) skips instead of running code on the box. Every self-hosted job
# also carries `environment: hw-runners` (required-reviewer approval), the
# workflow grants only `contents: read`, and no secrets are exposed. Any future
# self-hosted job added here MUST keep both the `HW_RUNNER_*` variable guard and
# the `github.actor == github.repository_owner` actor guard. The hosted bitrot gate
# (`hwtrace-privileged` in ci.yml) STAYS in ci.yml on ubuntu-latest — it must not
# move here, and a self-hosted `runs-on` must never appear in ci.yml.
name: hw (self-hosted, allowed-to-be-absent)

on:
  workflow_dispatch:
  schedule:
    # 05:00 UTC — two hours before ci.yml's 0 7 * * * nightly, so the two never
    # contend for a single one-box runner.
    - cron: '0 5 * * *'

permissions:
  contents: read

concurrency:
  # Static group => two hw.yml runs (a manual dispatch overlapping the nightly)
  # serialize instead of running at once; cancel-in-progress:false lets the first
  # finish rather than killing it. Keying on ${{ github.run_id }} would be UNIQUE
  # per run and group nothing — a no-op. A single self-hosted box also runs one
  # job at a time, so this is the belt to the runner's suspenders.
  group: hw-self-hosted
  cancel-in-progress: false

jobs:
  hwtrace-privileged-zen:
    name: hwtrace-privileged (self-hosted Zen — LIVE AMD LBR + IBS)
    # Guarded off by default: with the variable absent or `0` this reads "not 1"
    # and the job skips instantly, so the file lands ahead of all hardware. Flip
    # HW_RUNNER_AMD_ZEN to '1' only once a Zen 4/5 runner is registered. The
    # `github.actor == github.repository_owner` clause is the actor guard: the job
    # runs ONLY for a trigger the repo owner initiated (see the SECURITY POSTURE
    # note above) — a non-owner dispatch skips rather than executing on the box.
    if: vars.HW_RUNNER_AMD_ZEN == '1' && github.actor == github.repository_owner
    runs-on: [self-hosted, linux, x64, amd-zen]
    environment: hw-runners
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Live AMD capture under CAP_PERFMON (default seccomp)
        run: |
          set -o pipefail
          make docker-hwtrace-privileged 2>&1 | tee /tmp/hwzen.log

      - name: Assert the AMD live paths RAN (a self-skip HERE is a failure)
        run: |
          log=/tmp/hwzen.log
          if grep -q '# SKIP AMD LBR live capture' "$log"; then
            echo "::error::AMD LBR live capture SELF-SKIPPED on the Zen runner — the lane tested nothing. Wrong host, missing amd_lbr_v2, or a broken cap add."
            exit 1
          fi
          if grep -q '# SKIP IBS live capture' "$log"; then
            echo "::error::IBS live capture SELF-SKIPPED on the Zen runner."
            exit 1
          fi
          grep '# call_auto escalate:' "$log"
          if grep '# call_auto escalate:' "$log" | grep -q 'LBR window sufficed'; then
            echo "::error::call_auto did NOT escalate off the 16-deep window on a 25-back-edge loop — a REGRESSION of the 5d8e0d2 fix, not a known issue."
            exit 1
          fi
          if grep -q '^not ok' "$log"; then
            echo "::error::failing assertions:"; grep '^not ok' "$log"; exit 1
          fi
          echo "hwtrace-privileged-zen: AMD LbrExtV2 + live IBS ran (no self-skip); call_auto escalated off the LBR window."

  hwtrace-pt-baremetal:
    name: hwtrace-pt (self-hosted bare-metal Intel — LIVE Intel PT)
    # Same guard pair as the Zen lane: absent/`0` variable => instant skip, and the
    # actor clause keeps the box unreachable by anyone but the repo owner. Flip
    # HW_RUNNER_INTEL_PT to '1' only once a BARE-METAL Intel PT box is registered
    # with the `intel-pt` label (a VM will not do — a hypervisor that hides the
    # intel_pt PMU makes this lane red, which is the intended answer, not a flake).
    if: vars.HW_RUNNER_INTEL_PT == '1' && github.actor == github.repository_owner
    runs-on: [self-hosted, linux, x64, intel-pt]
    environment: hw-runners
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      # The broad tier first, in the same CAP_PERFMON / default-seccomp posture the
      # Zen lane uses. On Intel silicon the AMD LBR and IBS blocks inside it
      # self-skip (correctly — wrong vendor); what runs live here is the PT tier.
      - name: Hardware-capture tier under CAP_PERFMON (default seccomp)
        run: make docker-hwtrace-privileged

      # THE NON-VACUITY STEP, and deliberately not a grep. The Zen lane asserts by
      # grepping its live markers; PT cannot be checked that way — its skip text has
      # a known cosmetic misreport (analysis/2026-07-12-zen5-privileged-lbr-findings.md
      # §3), so a grep-based gate would be asserting on a string that lies. The honest
      # mechanism is the require-mode target: ASMTEST_REQUIRE_PT=1 turns the PT tier's
      # availability self-skip into a hard CHECK failure, so a host whose intel_pt PMU
      # is missing, hidden by a hypervisor, or unauthorized goes RED instead of quietly
      # green. The lane also prints the in-container PMU node so the shakedown answer
      # is in every run's log, not just the runbook.
      - name: Live Intel PT — REQUIRE mode (a self-skip here is a hard failure)
        run: make docker-hwtrace-pt-live

  hwtrace-coresight-board:
    name: hwtrace-coresight (self-hosted AArch64 board — DARK, no decoder yet)
    # DARK ON PURPOSE. Leave HW_RUNNER_CORESIGHT at `0`: the CoreSight tier
    # self-skips on every host today because asmtest_cs_decoder_present() returns 0
    # — the OpenCSD decode tree does not exist yet. Flipping this variable is the
    # ACCEPTANCE STEP of coresight-live-decode.md#T4, on the board that doc's #T2
    # brings up; turning it on before then buys a green lane that tests nothing.
    # No assert-greps here either: that doc owns its live markers, and writing
    # guesses at them now would be untested hardware code.
    if: vars.HW_RUNNER_CORESIGHT == '1' && github.actor == github.repository_owner
    runs-on: [self-hosted, linux, arm64, coresight]
    environment: hw-runners
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      # docker-hwtrace, not a host-native `make hwtrace-test`: the hwtrace image is
      # where libopencsd lives (coresight-live-decode T1 put it there so cs_backend.c
      # builds with -DASMTEST_HAVE_OPENCSD), so the container is the only place the
      # decode tree will link once it exists.
      - name: CoreSight tier (self-skips until the OpenCSD decode tree lands)
        run: make docker-hwtrace

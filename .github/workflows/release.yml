# Release (dry-run): assemble each binding's package from the cross-platform
# native payload, install it FRESH (no ASMTEST_LIB) and run a smoke test that the
# bundled native lib resolves, then dry-run the registry publish. Nothing is
# pushed to a live registry unless the matching token secret is present — the
# real-publish steps are gated `if: ${{ secrets.* != '' }}`, so this runs end to
# end on a fork with no credentials. See docs/packaging.md.
name: release (dry-run)

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # ---- Cross-platform native payloads -> a single `native-all` artifact ----- #
  # Mirrors the ci.yml `payloads` matrix: stage build/dist/native/<os>-<arch>/ on
  # each runner, then collect + verify into one tree the package jobs download.
  native:
    name: native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        # macos-latest is arm64; macos-15-intel is the Intel (x86_64) runner. Both
        # are required so the published packages/wheels carry a darwin-x86_64 payload
        # (repo-review B2) — README advertises "x86-64 and AArch64, Linux and macOS".
        # NOT macos-13: that image was retired 2025-12-08, so the leg never gets a
        # runner — it queues until it times out and the whole release stalls.
        # macos-15-intel is GitHub's documented successor and the LAST x86_64 image
        # (available until 2027-08); after that, darwin-x86_64 needs another source.
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-15-intel]
    steps:
      - uses: actions/checkout@v7
      - name: Install build deps (unicorn, pkg-config) + patchelf + tier deps
        run: |
          make deps DEPS_ARGS=--asm
          # Linux slots also bundle the native-trace tiers: patchelf (rpath), cmake
          # (the DynamoRIO client), and the hwtrace "full" decoders (libipt / OpenCSD;
          # DynamoRIO itself is auto-fetched by package-libs). Absent → hwtrace still
          # bundles decoder-free and the PT/CoreSight backends self-skip.
          # `if` (not `&& … || true`) so a genuine Linux apt failure fails the
          # step — else the payload silently ships hwtrace without PT/CoreSight
          # decoders — while still no-op'ing on the non-Linux (macOS) slots.
          # libipt (Intel PT decode) is x86-only — no libipt-dev exists on Ubuntu
          # ports/arm64 — so install it only on x86_64 and keep OpenCSD (CoreSight)
          # on both. Same split as the ci.yml payload lane (921e711); without it the
          # arm64 slot dies on `E: Unable to locate package libipt-dev`, and since
          # native-all `needs: [native]` the WHOLE release produces no payload.
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get install -y patchelf cmake libopencsd-dev
            if [ "$(uname -m)" = "x86_64" ]; then sudo apt-get install -y libipt-dev; fi
          fi
      - name: Build Keystone + Capstone from source (pinned optional tiers)
        run: ./scripts/build-keystone.sh && ./scripts/build-capstone.sh
      - name: Stage the host's native payload (superset + vendored deps + tiers + licenses)
        run: make package-libs
      - uses: actions/upload-artifact@v7
        with:
          name: native-payload-${{ matrix.os }}
          path: build/dist/native/
          if-no-files-found: error

  native-all:
    name: native (collect + verify)
    needs: [native]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Download every per-OS/arch payload
        uses: actions/download-artifact@v8
        with:
          pattern: native-payload-*
          path: payloads
      - name: Install llvm (so the darwin Mach-O checks actually run, not self-skip)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends llvm
      - name: Merge into one build/dist/native/ tree
        run: |
          mkdir -p build/dist/native
          cp -R payloads/*/* build/dist/native/
          # Assert the COMPLETE platform set is present, not just that each present
          # slot is well-formed (repo-review B2 — darwin-x86_64 used to be missing
          # while every job stayed green). A dropped matrix leg now fails here.
          make package-libs-verify \
            EXPECT_PLATFORMS="linux-x86_64 linux-aarch64 darwin-x86_64 darwin-arm64"
      - uses: actions/upload-artifact@v7
        with:
          name: native-all
          path: build/dist/native/
          if-no-files-found: error

  # ---- GPL §3 corresponding source for the redistributed engines ------------ #
  # The packages convey Unicorn + Keystone (GPL-2.0) as binaries, so a release must
  # make the corresponding source available. This assembles the upstream source at
  # the exact versions shipped — Keystone/Capstone pinned, Unicorn read from the
  # payload NOTICEs — and attaches it to the GitHub release (and uploads it as an
  # artifact for the dry-run), backing the written offer in each THIRD-PARTY-LICENSES.
  corresponding-source:
    name: corresponding source (GPL §3)
    needs: [native-all]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Uploading release assets needs contents:write (the global default is
    # contents:read); scope the elevation to this job only.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      # Reproducible source tarball (distribution-packaging.md T7): a stable,
      # digest-pinned source asset for the system-package specs (packaging/) and
      # Debian's orig-tarball flow. `make package-source` is `git archive` +
      # `gzip -n`, so a dispatch and the eventual tag produce byte-identical
      # bytes for a given commit; both the tarball and its SHA256SUMS are
      # attached to the release below and uploaded as a dry-run artifact.
      - name: Build the reproducible source tarball (make package-source)
        run: make package-source
      - uses: actions/download-artifact@v8
        with: { name: native-all, path: build/dist/native }
      - name: Assemble the corresponding-source archive
        run: |
          uv=$(grep -rhoE 'Unicorn[[:space:]]+[0-9][^[:space:]]*' \
                 build/dist/native/*/THIRD-PARTY-LICENSES/NOTICE 2>/dev/null \
               | awk '{print $2}' | sort -u | tr '\n' ' ')
          [ -n "$uv" ] || uv=2.1.4
          echo "Unicorn version(s) shipped: $uv"
          UNICORN_VERSIONS="$uv" scripts/fetch-corresponding-source.sh corresponding-source
      - uses: actions/upload-artifact@v7
        with:
          name: corresponding-source
          path: corresponding-source/
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        with:
          name: source-tarball
          path: |
            build/dist/asm-test-*.tar.gz
            build/dist/SHA256SUMS
          if-no-files-found: error
      - name: Attach to the GitHub release (on a tag)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # A pushed tag creates no release object, and `gh release upload`
          # cannot create one — ensure the release exists first (idempotent).
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 \
            || gh release create "${GITHUB_REF_NAME}" --verify-tag \
                 --title "${GITHUB_REF_NAME}" --notes "Release ${GITHUB_REF_NAME}"
          gh release upload "${GITHUB_REF_NAME}" \
            corresponding-source/*.tar.gz corresponding-source/SOURCES.txt \
            build/dist/asm-test-*.tar.gz build/dist/SHA256SUMS --clobber

  # ---- Per-binding: package -> install fresh -> smoke -> dry-run publish ----- #
  # Each job downloads native-all into build/dist/native/, builds the package
  # (which bundles every platform slot present), then installs it into a throwaway
  # project on this runner (linux-x86_64) and loads the library with ASMTEST_LIB
  # UNSET, so it must resolve the bundled native lib. The smoke call needs no
  # corpus fixture (a CPUID / probe), so it exercises the load path alone.
  # Python wheels are PER-PLATFORM (a wheel per tag), unlike the other dlopen
  # packages that bundle every platform in one artifact — so this builds its own
  # platform's native and a py3-none-<plat> wheel on each runner, then REPAIRS it
  # into a self-contained manylinux / macOS wheel that vendors libunicorn
  # (auditwheel on Linux, delocate on macOS — setup.py marks the wheel platlib so
  # they accept it). Install + smoke load the repaired wheel with ASMTEST_LIB
  # unset. (Independent of native-all, which serves the multi-platform packages.)
  python:
    name: python (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # macos-latest is arm64; macos-15-intel is the Intel (x86_64) runner. Both
        # are required so the published packages/wheels carry a darwin-x86_64 payload
        # (repo-review B2) — README advertises "x86-64 and AArch64, Linux and macOS".
        # NOT macos-13: that image was retired 2025-12-08, so the leg never gets a
        # runner — it queues until it times out and the whole release stalls.
        # macos-15-intel is GitHub's documented successor and the LAST x86_64 image
        # (available until 2027-08); after that, darwin-x86_64 needs another source.
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-15-intel]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - name: Install build deps + patchelf + tier deps, build Keystone + Capstone
        run: |
          make deps DEPS_ARGS=--asm
          # `if` so a real Linux apt failure fails the step, and libipt only on
          # x86_64 — it does not exist on Ubuntu ports/arm64 (see native job).
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get install -y patchelf cmake libopencsd-dev
            if [ "$(uname -m)" = "x86_64" ]; then sudo apt-get install -y libipt-dev; fi
          fi
          ./scripts/build-keystone.sh && ./scripts/build-capstone.sh
      - name: Build the platform-tagged wheel (superset + tiers + vendored deps)
        run: pip install build twine auditwheel delocate && make python-package
      - name: Repair -> manylinux / macOS (vendor libunicorn)
        run: |
          mkdir -p wheelhouse
          if [ "$RUNNER_OS" = "Linux" ]; then
            # The native-trace tier libs (libasmtest_hwtrace/_drapp/_drclient +
            # libdynamorio) are already self-contained in _libs/ ($ORIGIN rpath,
            # libdynamorio co-located). Exclude them from repair so auditwheel does
            # not relocate/rename them — renaming libdynamorio would break drapp's
            # dladdr sibling lookup — nor fail the manylinux policy on the prebuilt
            # DynamoRIO lib. They dlopen at run time, so they need no dep vendoring.
            python -m auditwheel repair \
              --exclude libasmtest_hwtrace.so --exclude libasmtest_drapp.so \
              --exclude libasmtest_drclient.so --exclude libdynamorio.so \
              build/dist/python/*.whl -w wheelhouse
          else
            delocate-wheel -w wheelhouse build/dist/python/*.whl
          fi
          ls wheelhouse
      - name: twine check
        run: twine check wheelhouse/*.whl
      - name: Install repaired wheel fresh + smoke (no ASMTEST_LIB)
        run: |
          python -m venv /tmp/venv && . /tmp/venv/bin/activate
          pip install wheelhouse/*.whl
          # Track E (docs/internal/plans/macos-clean-test-plan.md): the shared clean-room
          # scrub replaces the old ad-hoc `cd /tmp` — every ASMTEST_*/DYLD_*/LD_*
          # override is cleared and the cwd moves outside the checkout. The venv's
          # bin dir stays first on PATH (the scrub only drops brew//usr/local).
          . scripts/clean-env.sh
          python -c "import asmtest; assert asmtest.asm_available() and asmtest.disas_available(), 'optional tiers not available from the self-contained wheel'; print('python ok: asm + disas available')"
      - name: Clean-room assert the native-trace tiers resolve from the wheel (Linux)
        if: ${{ runner.os == 'Linux' }}
        run: |
          . /tmp/venv/bin/activate
          # Track E: source the shared scrub (env overrides cleared, cwd moved
          # outside the checkout) instead of the old per-invocation
          # `cd /tmp && env -u …` scrubs. It unsets a superset of the old -u
          # list; the assertions below are unchanged.
          . scripts/clean-env.sh
          python -m asmtest --where
          python - <<'PY'
          import platform, sysconfig
          from asmtest import hwtrace, drtrace
          site = sysconfig.get_paths()["purelib"]

          def in_wheel(who, p):
              assert p and p.startswith(site), f"{who} resolved OUTSIDE the wheel: {p}"
              assert "/build/" not in p, f"{who} leaked to a dev build/ tree: {p}"

          # The hwtrace LIB ships in every Linux wheel (any arch) and must resolve from it.
          hp = hwtrace.library_path()
          in_wheel("hwtrace", hp)

          # Its SINGLESTEP BACKEND, though, is x86-64 Linux/macOS only (src/hwtrace.c:
          # HWTRACE_HAVE_SINGLESTEP is gated on __x86_64__), so available() is False on
          # aarch64 — the lib loads and self-skips with a documented reason. Assert the
          # backend where it exists, and assert the DOCUMENTED SELF-SKIP where it does
          # not, matching on that reason so an unexpected failure (a missing Capstone,
          # say) still trips this gate rather than passing as "expected absence".
          if platform.machine() in ("x86_64", "AMD64"):
              assert hwtrace.HwTrace.available(hwtrace.SINGLESTEP), "hwtrace SINGLESTEP not available from the wheel"
          else:
              assert not hwtrace.HwTrace.available(hwtrace.SINGLESTEP), (
                  f"hwtrace SINGLESTEP reports available on {platform.machine()}, but the "
                  "backend is documented x86-64-only. If it now works here, update this gate.")
              reason = hwtrace.HwTrace.skip_reason(hwtrace.SINGLESTEP)
              assert "x86-64" in reason, (
                  f"hwtrace SINGLESTEP unavailable on {platform.machine()} for an "
                  f"UNEXPECTED reason (want the documented x86-64-only self-skip): {reason}")

          # drtrace (DynamoRIO) ships ONLY in the linux-x86_64 wheel: package-libs-drtrace
          # stages that slot alone and scripts/fetch-dynamorio.sh fetches the x86-64
          # tarball. Assert it resolves where it ships, and assert its DOCUMENTED ABSENCE
          # where it does not — never skip, so that either dropping the tier on x86_64 or
          # starting to ship it elsewhere fails this gate instead of passing silently.
          # (This used to call drtrace.library_path() unconditionally, ABOVE its own
          # platform guard, so the arm64 leg died on the OSError the guard existed to
          # avoid.)
          if platform.machine() in ("x86_64", "AMD64"):
              dp = drtrace.library_path()
              in_wheel("drtrace", dp)
              assert drtrace.NativeTrace.available(), "drtrace not available from the wheel (bundled libdynamorio not found)"
              print(f"python clean-room ok: hwtrace {hp}")
              print(f"python clean-room ok: drtrace {dp}")
          else:
              try:
                  dp = drtrace.library_path()
              except OSError:
                  pass  # documented: no drtrace tier off linux-x86_64
              else:
                  raise AssertionError(
                      f"drtrace resolved on {platform.machine()} ({dp}), but the payload is "
                      "documented linux-x86_64-only for this tier (mk/bindings.mk "
                      "package-libs-drtrace). If it now ships here, update this gate.")
              print(f"python clean-room ok: hwtrace {hp}")
              print(f"python clean-room ok: drtrace absent, as documented on {platform.machine()}")
          PY
      - uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.os }}
          path: wheelhouse/*.whl
      # PyPI upload moved to the dedicated `pypi-publish` job below: PyPI Trusted
      # Publishing (OIDC, no stored token — distribution-packaging.md T4) uses
      # pypa/gh-action-pypi-publish, which is Linux-only, so it cannot run on the
      # macOS matrix legs here; a single collector job publishes every leg's wheel.

  # PyPI Trusted Publishing (OIDC) — distribution-packaging.md T4. Collects every
  # matrix leg's wheel and uploads via pypa/gh-action-pypi-publish, which performs
  # the OIDC exchange (no PYPI_TOKEN). Tag-gated (a workflow_dispatch skips the
  # whole job), and id-token:write is scoped to THIS job only (the workflow default
  # is contents:read, line 14). GATED until a trusted publisher is registered on the
  # `asmtest` PyPI project (owner wilvk, repo asm-test, workflow release.yml, env
  # pypi) — see releasing.md; without it the OIDC upload is refused on the tag.
  pypi-publish:
    name: publish to PyPI (OIDC trusted publishing)
    needs: [python]
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with: { pattern: wheel-*, path: dist, merge-multiple: true }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  # node / ruby / lua / java / dotnet all share one flow: download native-all,
  # `make <lang>-package`, install the artifact fresh (ASMTEST_LIB unset) and load
  # the bundled native lib. The per-language bits — toolchain setup, the smoke
  # one-liner, and the optional registry publish — are carried in the matrix
  # `include`. Python (per-platform wheel + repair) and the link/source bindings
  # (rust/go/cpp/zig) are different enough to keep their own jobs below.
  dlopen-package:
    name: ${{ matrix.lang }} (${{ matrix.os }})
    needs: [native-all]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    # id-token:write lets the node leg attach an npm provenance attestation
    # (distribution-packaging.md T4); the workflow default is contents:read.
    # Harmless for the non-node legs.
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        lang: [node, ruby, lua, java, dotnet]
        # macos-15-intel (Intel) alongside macos-latest (arm64) so the Intel-mac
        # install is smoke-tested too; the packages already bundle every native-all
        # slot. (macos-13 was retired 2025-12-08 — see the native job.)
        os: [ubuntu-latest, macos-latest, macos-15-intel]
        # Each smoke installs/builds with the FULL env first (package managers and
        # builds need it), then sources scripts/clean-env.sh — the shared clean-room
        # scrub (Track E, docs/internal/plans/macos-clean-test-plan.md): every ASMTEST_*/
        # DYLD_*/LD_* override cleared, brew//usr/local dropped from PATH, cwd moved
        # outside the checkout — and only then runs the load. Interpreters are
        # resolved to absolute paths BEFORE sourcing (the PATH scrub may drop their
        # dir, e.g. brew luajit). The assertions themselves are unchanged.
        include:
          - lang: node
            smoke: |
              cd "$GITHUB_WORKSPACE/bindings/node" && npm publish --dry-run
              mkdir -p /tmp/t && cd /tmp/t && npm init -y >/dev/null
              npm install "$GITHUB_WORKSPACE"/build/dist/node/asmtest-*.tgz
              NODE="$(command -v node)"
              . "$GITHUB_WORKSPACE/scripts/clean-env.sh"
              cd /tmp/t && "$NODE" -e "const a=require('asmtest'); if(!a.disasAvailable())throw new Error('disassembler tier not available from the self-contained package'); console.log('node ok: disas available')"
          - lang: ruby
            smoke: |
              gem install --local --no-document build/dist/ruby/asmtest-*.gem
              RUBY="$(command -v ruby)"
              . "$GITHUB_WORKSPACE/scripts/clean-env.sh"
              "$RUBY" -e "require 'asmtest'; raise 'disassembler tier not available from the self-contained gem' unless Asmtest.disas_available?; puts 'ruby ok: disas available'"
          - lang: lua
            smoke: |
              mkdir -p /tmp/t && cp bindings/lua/asmtest.lua /tmp/t/ && cp -R bindings/lua/native /tmp/t/
              LUAJIT="$(command -v luajit)"
              . "$GITHUB_WORKSPACE/scripts/clean-env.sh"
              "$LUAJIT" -e "package.path='/tmp/t/?.lua;'..package.path; local a=require('asmtest'); assert(a.disas_available(), 'disassembler tier not available from the self-contained rock'); print('lua ok: disas available')"
          - lang: java
            smoke: |
              printf 'public class Smoke { public static void main(String[] a){ if(!Asmtest.disasAvailable()) throw new RuntimeException("disassembler tier not available from the self-contained jar"); System.out.println("java ok: disas available"); }}' > /tmp/Smoke.java
              javac --release 22 -cp build/dist/java/asmtest-*.jar -d /tmp /tmp/Smoke.java
              jar="$(ls "$GITHUB_WORKSPACE"/build/dist/java/asmtest-*.jar)"
              JAVA="$(command -v java)"
              . "$GITHUB_WORKSPACE/scripts/clean-env.sh"
              "$JAVA" --enable-native-access=ALL-UNNAMED -cp "$jar:/tmp" Smoke
          - lang: dotnet
            smoke: |
              ver="$(make -s -C "$GITHUB_WORKSPACE" print-version)"
              cd /tmp && dotnet new console -o app && cd app
              dotnet nuget add source "$GITHUB_WORKSPACE/build/dist/dotnet" -n local
              dotnet add app.csproj package AsmTest --version "$ver"
              printf 'using Asmtest; class P { static void Main(){ if(!Emu.DisasAvailable) throw new System.Exception("disassembler tier not available from the self-contained nupkg"); System.Console.WriteLine("dotnet ok: disas available"); } }' > Program.cs
              dotnet build --nologo -v q
              DOTNET="$(command -v dotnet)"
              . "$GITHUB_WORKSPACE/scripts/clean-env.sh"
              "$DOTNET" exec "$(ls /tmp/app/bin/Debug/*/app.dll | head -1)"
    steps:
      - uses: actions/checkout@v7
      - if: ${{ matrix.lang == 'node' }}
        uses: actions/setup-node@v6
        with: { node-version: "20" }
      - if: ${{ matrix.lang == 'ruby' }}
        uses: ruby/setup-ruby@v1
        with: { ruby-version: "3.2" }
      # Compile/run the packaged jar on a JDK != 21 with no --enable-preview: a
      # preview-classfile jar (--enable-preview) refuses to load here, so this
      # smoke is the gate that the jar is consumable on modern JDKs (FFM final).
      - if: ${{ matrix.lang == 'java' }}
        uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: "25" }
      - if: ${{ matrix.lang == 'dotnet' }}
        uses: actions/setup-dotnet@v5
        with: { dotnet-version: "10.0.x" }
      - if: ${{ matrix.lang == 'lua' }}
        name: Install LuaJIT
        run: if [ "$RUNNER_OS" = "macOS" ]; then brew install luajit; else sudo apt-get update && sudo apt-get install -y luajit; fi
      - uses: actions/download-artifact@v8
        with: { name: native-all, path: build/dist/native }
      - name: Build the ${{ matrix.lang }} package
        run: make ${{ matrix.lang }}-package
      - name: Install fresh + smoke (self-contained native, no ASMTEST_LIB, no system deps)
        run: ${{ matrix.smoke }}
      # Real registry publish: tag builds only, once from Linux, and only when the
      # matching token secret is present (so forks/dry-runs no-op). lua + java have
      # no registry here, so they fall through.
      - name: Publish to the registry (only with a token; once, from Linux)
        if: ${{ matrix.os == 'ubuntu-latest' && startsWith(github.ref, 'refs/tags/') }}
        # Tokens scoped to the publish step only, so the build/smoke steps that run
        # the just-built package can't read them.
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          case "${{ matrix.lang }}" in
            node)
              # --provenance attaches a signed build-provenance attestation via the
              # job's id-token (distribution-packaging.md T4); verify with
              # `npm audit signatures`. Needs the public repository URL in
              # package.json to match (it does) + a cloud runner (both hold).
              [ -n "$NPM_TOKEN" ] || { echo "no NPM_TOKEN; skip"; exit 0; }
              cd bindings/node && echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > ~/.npmrc && npm publish --provenance ;;
            ruby)
              [ -n "$RUBYGEMS_API_KEY" ] || { echo "no RUBYGEMS_API_KEY; skip"; exit 0; }
              GEM_HOST_API_KEY="$RUBYGEMS_API_KEY" gem push build/dist/ruby/asmtest-*.gem ;;
            dotnet)
              [ -n "$NUGET_API_KEY" ] || { echo "no NUGET_API_KEY; skip"; exit 0; }
              dotnet nuget push build/dist/dotnet/*.nupkg -k "$NUGET_API_KEY" -s https://api.nuget.org/v3/index.json --skip-duplicate ;;
            *) echo "no registry publish for ${{ matrix.lang }}" ;;
          esac

  # Maven Central (java) — distribution-packaging.md T6. The java leg of
  # dlopen-package above already BUILDS + smokes the jar via `make java-package`
  # (a real `mvn package` consuming bindings/java/pom.xml); this job additionally
  # PUBLISHES it — sources + javadoc + detached PGP signatures, via the Central
  # Portal publisher plugin declared in the pom. The build step always runs (a
  # workflow_dispatch dry-run proves the mvn build stays green); the deploy step is
  # tag-gated AND doubly secret-gated — it no-ops unless BOTH MAVEN_CENTRAL_TOKEN and
  # MAVEN_GPG_KEY are present, exactly like the crates/npm publishes. GATED until the
  # `io.github.wilvk` namespace is verified on central.sonatype.com and those secrets
  # exist; the plugin's default autoPublish=false uploads to STAGING only (the Portal
  # validation report is the acceptance test) — see releasing.md.
  maven:
    name: java (Maven Central)
    needs: [native-all]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      # setup-java gives the JDK; `mvn` itself is preinstalled on the ubuntu runner
      # (as it is for the java leg of dlopen-package's `make java-package`).
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: "25" }
      - uses: actions/download-artifact@v8
        with: { name: native-all, path: build/dist/native }
      # Always: build the classified jar + sources + javadoc (dispatch-safe, no
      # secrets — GPG is the verify-phase step, skipped here). Leaves the staged
      # standard-layout tree in build/java-mvn for the deploy step to publish from.
      - name: Build the Maven artifacts (mvn package)
        run: make java-package
      - name: Deploy to Maven Central (mvn deploy — signs + uploads to staging)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        # Secrets scoped to this step only, so the build step above can't read them.
        env:
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          MAVEN_GPG_KEY: ${{ secrets.MAVEN_GPG_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          if [ -z "$MAVEN_CENTRAL_TOKEN" ] || [ -z "$MAVEN_GPG_KEY" ]; then
            echo "no MAVEN_CENTRAL_TOKEN / MAVEN_GPG_KEY; skip Central publish"; exit 0
          fi
          # Import the release signing key for maven-gpg-plugin. The pom already
          # configures loopback pinentry, so the passphrase flows from -Dgpg.passphrase.
          printf '%s' "$MAVEN_GPG_KEY" | gpg --batch --import
          # Central Portal server creds; the id MUST match the pom's
          # publishingServerId=central. MAVEN_CENTRAL_TOKEN holds "<user>:<pass>" from
          # the Portal-generated user token.
          mkdir -p ~/.m2
          printf '<settings><servers><server><id>central</id><username>%s</username><password>%s</password></server></servers></settings>' \
            "${MAVEN_CENTRAL_TOKEN%%:*}" "${MAVEN_CENTRAL_TOKEN#*:}" > ~/.m2/settings.xml
          cd build/java-mvn && mvn -B -Dgpg.skip=false \
            -Dgpg.passphrase="$MAVEN_GPG_PASSPHRASE" deploy

  # ---- Link bindings (source dists) ----------------------------------------- #
  # These ship source, not a prebuilt binary: the consumer links/builds the
  # framework itself. There is no registry payload to install, so the release
  # check is that the published source is consumable — it builds / vets / packs.
  rust:
    name: rust (crate)
    needs: [native-all]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # crates.io Trusted Publishing (OIDC) needs id-token:write on this job only
    # (distribution-packaging.md T4); the workflow default is contents:read.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      # libasmtest_emu is the superset, so building/linking it needs Keystone +
      # Capstone (no apt package for Keystone — pinned source build).
      - run: make deps DEPS_ARGS=--asm
      - run: ./scripts/build-keystone.sh && ./scripts/build-capstone.sh
      - name: cargo publish --dry-run
        run: cd bindings/rust && cargo publish --dry-run --allow-dirty
      # crates.io Trusted Publishing (OIDC) — distribution-packaging.md T4. The
      # auth action performs the OIDC exchange and emits a short-lived (30-min)
      # token; no stored CARGO_REGISTRY_TOKEN. Tag-gated (a workflow_dispatch skips
      # both steps). GATED until a trusted publisher is registered for the
      # `asm-test` crate (GitHub Actions, owner wilvk, repo asm-test) — see
      # releasing.md; without it the exchange is refused on the tag.
      - name: Authenticate to crates.io (OIDC trusted publishing)
        id: crates-auth
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: rust-lang/crates-io-auth-action@v1
      - name: Publish to crates.io
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: cd bindings/rust && cargo publish --allow-dirty

  go:
    name: go (module)
    needs: [native-all]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: "stable" }
      # libasmtest_emu is the superset, so it needs Keystone + Capstone at build
      # time (no apt package for Keystone — pinned source build).
      - run: make deps DEPS_ARGS=--asm
      - run: ./scripts/build-keystone.sh && ./scripts/build-capstone.sh && make shared-emu
      # Go modules publish from the tagged repo (proxy.golang.org fetches on
      # demand); the release check is that the cgo module vets + builds.
      - name: go vet + build
        run: cd bindings/go && CGO_LDFLAGS="-L$GITHUB_WORKSPACE/build" go vet ./... && CGO_LDFLAGS="-L$GITHUB_WORKSPACE/build" go build ./...
      # A downstream consumer `go get`s the module and links a *binary* — the
      # step `go build ./...` on a library skips (no final link), so it never
      # catches a stray -l on a lib that make install-shared doesn't stage. The
      # default (untagged) build must link against libasmtest_emu alone; the
      # corpus fixture is test-only (behind the asmtest_corpus tag).
      - name: A consumer links the module against libasmtest_emu alone (N1 gate)
        run: |
          mkdir -p /tmp/goconsumer && cd /tmp/goconsumer
          go mod init consumer
          go mod edit -require=github.com/wilvk/asm-test/bindings/go@v0.0.0
          go mod edit -replace=github.com/wilvk/asm-test/bindings/go=$GITHUB_WORKSPACE/bindings/go
          printf 'package main\nimport asmtest "github.com/wilvk/asm-test/bindings/go"\nfunc main() { r := asmtest.NewRegs(); r.Free() }\n' > main.go
          CGO_LDFLAGS="-L$GITHUB_WORKSPACE/build" GOFLAGS=-mod=mod GOPROXY=off GOTOOLCHAIN=local go build -o consumer .
          LD_LIBRARY_PATH=$GITHUB_WORKSPACE/build ./consumer && echo "go ok: module links libasmtest_emu without the corpus fixture"

  cpp:
    name: cpp (header + cmake)
    needs: [native-all]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      # libasmtest_emu is the superset, so it needs Keystone + Capstone at build
      # time (no apt package for Keystone — pinned source build).
      - run: make deps DEPS_ARGS=--asm
      - run: ./scripts/build-keystone.sh && ./scripts/build-capstone.sh && make shared-emu
      - name: Package the header tarball
        run: make cpp-package
      - name: A consumer compiles + links + runs against the packaged header
        run: |
          mkdir -p /tmp/dep && tar xzf build/dist/cpp/asmtest-cpp-*.tar.gz -C /tmp/dep
          printf '#define ASMTEST_ENABLE_EMU\n#include "asmtest.hpp"\nint main(){ asmtest::Emu e; (void)e; return 0; }\n' > /tmp/consumer.cpp
          g++ -std=c++17 -I/tmp/dep -Iinclude /tmp/consumer.cpp -L build -lasmtest_emu -o /tmp/consumer
          LD_LIBRARY_PATH=build /tmp/consumer && echo "cpp ok: packaged header consumable"

  zig:
    name: zig (package)
    needs: [native-all]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: mlugg/setup-zig@v2
        with: { version: "0.13.0" }
      # libasmtest_emu is the superset, so it needs Keystone + Capstone at build
      # time (no apt package for Keystone — pinned source build).
      - run: make deps DEPS_ARGS=--asm
      - run: ./scripts/build-keystone.sh && ./scripts/build-capstone.sh && make shared-emu build/libasmtest_corpus.so
      - name: Package + build the packaged source against the framework
        run: |
          make zig-package
          mkdir -p /tmp/dep && tar xzf build/dist/zig/asmtest-zig-*.tar.gz -C /tmp/dep
          cd /tmp/dep && LD_LIBRARY_PATH="$GITHUB_WORKSPACE/build" \
            zig build test -Dincdir="$GITHUB_WORKSPACE/include" -Dlibdir="$GITHUB_WORKSPACE/build"

name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Intel macOS is scarce/slow, so the x86-64 Mach-O tier doesn't run per-push;
  # the `test-macos-x86` job below picks it up nightly (and on manual dispatch).
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC daily
  workflow_dispatch:

# Cancel an in-progress run for the same ref when a new commit is pushed, so
# queued push/PR runs don't pile up. Scheduled + manual runs get a UNIQUE group
# (keyed on run_id) so the scarce nightly Intel-macOS lane (test-macos-x86, gated
# on `schedule`/`workflow_dispatch`) is never cancelled by a daytime push to main:
# both share the `main` ref, and cancel-in-progress would otherwise kill the ~1h
# nightly mid-flight.
concurrency:
  group: ci-${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.run_id || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Cover {x86-64, AArch64} x {Linux/ELF, macOS/Mach-O}. The x86-64 macOS
        # corner (macos-15-intel) is scarce/slow, so it runs nightly in the
        # `test-macos-x86` job below rather than gating every push.
        #   ubuntu-latest     x86-64  Linux  (gcc, ELF @function)
        #   ubuntu-24.04-arm  aarch64 Linux  (gcc, ELF %function)
        #   macos-latest      aarch64 macOS  (clang, Mach-O)
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Toolchain versions
        run: |
          cc --version
          make --version | head -1
          uname -m

      - name: Build and run test suites
        run: make WERROR=1 test

      # AArch64 SVE EXECUTION sign-off (aarch64-sve-capture T8). ubuntu-24.04-arm is
      # Azure Cobalt 100 / Neoverse-N2 — real SVE2 silicon at VL=16 B — so the SVE
      # trampoline and its ptrue/fadd body actually EXECUTE here; the docker-sve-sweep
      # lane's wider VLs are qemu-user TCG *emulation*, which is not a silicon sign-off.
      # The assertion that matters is the negative one: the SVE test must NOT self-skip.
      # ASM_SVCALL_* skips cleanly on a host without HWCAP_SVE (by design — macOS arm64
      # has no non-streaming SVE, and older arm64 parts have none at all), so a runner
      # fleet change or a regressed HWCAP probe would keep this leg green while quietly
      # retiring the ONLY real-silicon validation the SVE path has. Fail loudly instead,
      # and print the silicon facts every run so the sign-off (VL, CPU part, kernel)
      # stays checkable rather than remembered.
      - name: SVE silicon sign-off (must execute, not skip)
        if: matrix.os == 'ubuntu-24.04-arm'
        run: |
          uname -srm
          grep -m1 '^CPU part' /proc/cpuinfo
          grep -m1 '^Features' /proc/cpuinfo | tr ' ' '\n' | grep -qx sve \
            || { echo "FAIL: no SVE in HWCAP — this runner is not SVE silicon"; exit 1; }
          echo "SVE VL (bytes): $(cat /proc/sys/abi/sve_default_vector_length)"
          ./build/test_simd | tee /tmp/simd.tap
          grep -q '^ok [0-9]* - simd\.sve_adds_doubles_at_any_vl$' /tmp/simd.tap \
            || { echo "FAIL: simd.sve_adds_doubles_at_any_vl skipped or absent — the SVE execution sign-off is gone"; exit 1; }

      # xmllint validates the JUnit XML (incl. escaping of < & > " in failure
      # messages) in `make check`. Preinstalled on the runners, but make it
      # deterministic; macOS ships it natively.
      - name: Install xmllint (JUnit XML validation)
        run: if [ "$RUNNER_OS" = "Linux" ]; then sudo apt-get update && sudo apt-get install -y --no-install-recommends libxml2-utils; fi

      - name: Framework self-tests (meta-tests; assertions/runner/containment)
        run: make WERROR=1 check

      - name: Failure demo (informational; detects intentional failures)
        run: make demo-fail

      - name: Robustness demo (informational; hang/crash containment)
        run: make demo-robust

      - name: Benchmark demo (informational; cycles/call)
        run: make bench

  # Native rv64 host tier (riscv-native-tier). No hosted riscv64 runner exists,
  # so this leg runs the core suites in a linux/riscv64 container under QEMU
  # binfmt (tonistiigi/binfmt, pinned in mk/docker.mk). Slower than native legs
  # by ~10-20x — hence the fat timeout and core-only scope. Unlike the native
  # ubuntu-24.04-arm row in the `test` matrix, this is Docker-under-QEMU (there
  # is no hosted riscv64 runner), so it is a separate job, not a matrix row.
  test-riscv64:
    name: test (riscv64 container, qemu binfmt)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - name: Enable riscv64 binfmt (pinned QEMU)
        run: make binfmt-riscv64
      - name: Core suites + self-tests in the riscv64 container
        run: make docker-riscv64

  # Cross-system benchmarking (docs/internal/plans/cross-arch-benchmarking-plan.md).
  # Runs the two-dimensional benchmark on each per-push OS x arch leg and uploads
  # the normalized per-system report; the `benchmarks-compare` job below merges
  # them into one cross-system matrix. Every leg also gates the DETERMINISTIC
  # golden emu counts (host/OS-independent, so the committed golden must match a
  # fresh run everywhere — the manifest/conformance golden pattern).
  # The five-system matrix: the three per-push legs here (ubuntu x86-64, ubuntu
  # arm64, macOS arm64), the per-push `benchmarks-windows` leg, and the nightly
  # `benchmarks-macos-x86` (Intel) leg. `benchmarks-compare` merges every leg's
  # report; on the nightly schedule `benchmarks-record` commits each leg's per-box
  # record (benchmarks/boxes/gh-**) back to main. Golden emu counts stay a reviewed
  # human PR — never auto-committed.
  benchmarks:
    name: benchmarks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    # Runner VMs draw from a fleet of CPU models, so the default box_id (a hash of
    # the CPU string) would mint a new box per model. Pin the box id to the runner
    # label so per-box history is stable across VM swaps (the plan's §6.1 rule; the
    # nightly record commit in `benchmarks-record` depends on it). The arm64 live
    # ptrace record step below overrides this inline with its own committed id.
    env:
      ASMTEST_BOX_ID: gh-${{ matrix.os }}
      # The pinned Capstone build installs to /usr/local (build-capstone.sh) and its dylib's
      # install-name is @rpath/libcapstone.5.dylib. On Linux `ldconfig` makes it findable; macOS
      # has no loader cache and emu-bench carries no matching LC_RPATH, so on the macos-latest
      # (arm64) leg dyld fails with "Library not loaded: @rpath/libcapstone.5.dylib" and emu-bench
      # aborts (SIGABRT) under bench-check/-report. Point dyld's fallback search at the install
      # dir; ignored on Linux (DYLD_* is macOS-only), so it is safe job-wide.
      DYLD_FALLBACK_LIBRARY_PATH: /usr/local/lib
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    steps:
      - uses: actions/checkout@v7

      # unicorn (+ capstone) for the emulator/count producer and the feature
      # probe; the hwtrace single-step tier needs no extra dependency.
      - name: Install the emulator tier deps
        run: make deps DEPS_ARGS=--emu

      # Capstone (pinned source build, K1-cached) so emu-bench can classify each
      # executed instruction and emit the BM_MODEL_COST model_cost rows; without
      # it the bench still runs and simply omits the model matrix (absence is
      # data). Mirrors the emu job's steps. (The nightly macos-15-intel leg gets
      # the same pair when it lands.)
      - name: Cache the pinned Capstone source build (K1)
        uses: actions/cache@v6
        with:
          path: ~/.cache/asmtest-thirdparty/capstone
          key: tp-capstone-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/build-capstone.sh', 'scripts/lib-thirdparty.sh', 'scripts/third-party-digests.txt', 'scripts/thirdparty-cache.sh') }}

      - name: Build and install Capstone from source (model-cost weighting)
        run: sh scripts/thirdparty-cache.sh cached-build capstone   # pinned source build; restores from the cache when warm

      - name: Gate the deterministic golden emu counts (host-independent)
        run: make bench-check

      - name: Run the cross-system benchmark report
        run: make bench-report

      - name: Upload the per-system report
        uses: actions/upload-artifact@v7
        with:
          name: bench-report-${{ matrix.os }}
          path: build/bench-report-*.json
          if-no-files-found: error

      # T3 (SS-A64-STREAM): record the FIRST arm64 benchmarks/boxes entry, whose
      # features.json carries the LIVE native-oop ptrace row (available:true, the ptrace
      # tier actually captured the add3 fixture on real silicon). This benchmarks job runs
      # natively on ubuntu-24.04-arm (Azure Cobalt 100), NOT under qemu, so the tier is
      # live here. ASMTEST_VIRTUALIZED=1: the runner is a VM, so its perf history is flagged
      # not-comparable (scripts/bench-report.sh). Explicit ASMTEST_BOX_ID: arm64
      # /proc/cpuinfo has no vendor_id/model name, so the auto id would degrade to
      # unknown-linux-arm64-<hash>. Commit benchmarks/boxes/arm-linux-arm64-gha/ to main
      # from a green run's artifact (aarch64-ptrace-single-step-validation T3).
      - name: Record the arm64 box entry (native-oop ptrace tier, live)
        if: matrix.os == 'ubuntu-24.04-arm'
        run: ASMTEST_VIRTUALIZED=1 ASMTEST_BOX_ID=arm-linux-arm64-gha make bench-record

      - name: Upload the arm64 box record
        if: matrix.os == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: arm64-box-record
          path: benchmarks/boxes/arm-linux-arm64-gha/
          if-no-files-found: error

      # Nightly (and manual dispatch) only: persist this leg's per-box record
      # (features.json + one perf-history line, box id = the job's gh-<label>) so
      # `benchmarks-record` can commit it. Per-push runs skip this — history is a
      # nightly trend, not a per-commit assertion.
      - name: Record this box (nightly)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: make bench-record

      - name: Upload this box record (nightly)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: bench-boxes-${{ matrix.os }}
          path: benchmarks/boxes/
          if-no-files-found: error

  # Merge every leg's report into one cross-system comparison (performance
  # matrices + the feature & trace-completeness grid) and publish it.
  benchmarks-compare:
    name: benchmarks (cross-system compare)
    # The macOS-Intel (nightly) and Windows (per-push) legs feed the same compare.
    # The `if` keys only off the per-push `benchmarks` matrix, so per-push runs
    # still compare the three matrix reports even though the nightly Intel leg is
    # skipped (the package-libs-collect needs-many / if-one pattern).
    needs: [benchmarks, benchmarks-macos-x86, benchmarks-windows]
    if: ${{ !cancelled() && needs.benchmarks.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Download every per-system report
        uses: actions/download-artifact@v8
        with:
          pattern: bench-report-*
          path: reports/
          merge-multiple: true
      - name: Build the cross-system comparison
        run: |
          python3 scripts/bench-compare reports/*.json | tee comparison.md
          echo "## Cross-system benchmark comparison" >> "$GITHUB_STEP_SUMMARY"
          cat comparison.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload the comparison
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-comparison
          path: comparison.md
          if-no-files-found: error

  # The x86-64 macOS benchmark leg. Intel runners are scarce/slow, so — exactly
  # like `test-macos-x86` — this runs nightly (and on manual dispatch) rather than
  # gating every push; `benchmarks-compare` merges its report when present and the
  # three per-push legs compare fine without it. macos-15-intel is GitHub's last
  # x86_64 image (supported through 2027-08); NEVER macos-13 (retired 2025-12-08).
  benchmarks-macos-x86:
    name: benchmarks (macos-15-intel, nightly)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-15-intel
    timeout-minutes: 15
    env:
      ASMTEST_BOX_ID: gh-macos-15-intel
    steps:
      - uses: actions/checkout@v7

      - name: Install the emulator tier deps
        run: make deps DEPS_ARGS=--emu

      # Capstone (pinned source build, K1-cached) so emu-bench emits the
      # BM_MODEL_COST model_cost rows on this leg too; mirrors the `benchmarks` job.
      - name: Cache the pinned Capstone source build (K1)
        uses: actions/cache@v6
        with:
          path: ~/.cache/asmtest-thirdparty/capstone
          key: tp-capstone-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/build-capstone.sh', 'scripts/lib-thirdparty.sh', 'scripts/third-party-digests.txt', 'scripts/thirdparty-cache.sh') }}

      - name: Build and install Capstone from source (model-cost weighting)
        run: sh scripts/thirdparty-cache.sh cached-build capstone   # pinned source build; restores from the cache when warm

      - name: Gate the deterministic golden emu counts (host-independent)
        run: make bench-check

      - name: Run the cross-system benchmark report
        run: make bench-report

      - name: Upload the per-system report
        uses: actions/upload-artifact@v7
        with:
          name: bench-report-macos-15-intel
          path: build/bench-report-*.json
          if-no-files-found: error

      # Nightly-only per-box record (this job is already nightly-gated, but keep the
      # step gate explicit and uniform with the per-push legs).
      - name: Record this box (nightly)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: make bench-record

      - name: Upload this box record (nightly)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: bench-boxes-macos-15-intel
          path: benchmarks/boxes/
          if-no-files-found: error

  # The real-Windows benchmark leg — per push (windows runners are plentiful,
  # unlike Intel macs). Builds the PE producers with the mingw toolchain and runs
  # the deterministic golden gate on a genuine Windows kernel, then a full
  # per-system report. Uses the same MSYS2/MINGW64 shell as the `windows` job.
  # Engine versions cannot be pinned here (MSYS2 is a rolling repo); the golden
  # gate is Capstone-version-independent (model rows are filtered out of it) and
  # the poured versions are logged below.
  benchmarks-windows:
    name: benchmarks (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      ASMTEST_BOX_ID: gh-windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v7
      - uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2.32.0
        with:
          msystem: MINGW64
          update: true
          # nasm builds suite_win64.exe's capture/routines objects (win64-bench-report);
          # git + python3 are needed by bench-report.sh; pkgconf resolves the mingw
          # unicorn/capstone the win64.mk flag defaults pick up.
          install: >-
            make git coreutils nasm
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-unicorn
            mingw-w64-x86_64-capstone
            mingw-w64-x86_64-python
            mingw-w64-x86_64-pkgconf

      # MSYS2 is a rolling repo (no version pin), so record what was actually
      # poured — the golden gate does not depend on it, but the report's native
      # cycle values and any future triage do.
      - name: Toolchain + engine versions
        run: pacman -Q mingw-w64-x86_64-unicorn mingw-w64-x86_64-capstone mingw-w64-x86_64-gcc

      - name: Gate the deterministic golden emu counts on real Windows
        run: make win64-bench-check WIN64_CC=gcc WINE=

      - name: Full per-system Windows report
        run: make win64-bench-report WIN64_CC=gcc WINE=

      - name: Upload the per-system report
        uses: actions/upload-artifact@v7
        with:
          name: bench-report-windows-latest
          path: build/bench-report-*.json
          if-no-files-found: error

      # Nightly (and manual dispatch) only: persist this Windows box's record.
      - name: Record this box (nightly)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: make win64-bench-record WIN64_CC=gcc WINE=

      - name: Upload this box record (nightly)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: bench-boxes-windows-latest
          path: benchmarks/boxes/
          if-no-files-found: error

  # Nightly (and manual dispatch): collect every leg's per-box record and commit
  # benchmarks/boxes/gh-** back to main as github-actions[bot]. GITHUB_TOKEN pushes
  # do not trigger new workflow runs (the [skip ci] trailer is belt-and-braces), so
  # there is no recursive-CI risk. Only the auto-managed gh-<runner> boxes are
  # staged — the human-curated boxes (arm-linux-arm64-gha, the amd-linux dev boxes)
  # are never auto-committed. Golden files are DELIBERATELY excluded: golden drift is
  # a reviewed change (every leg's bench-check already gates it), so auto-committing
  # it would launder a regression into history.
  benchmarks-record:
    name: benchmarks (nightly record commit)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: [benchmarks, benchmarks-macos-x86, benchmarks-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Naming any permission zeroes the unspecified scopes FOR THIS JOB ONLY (other
    # jobs keep the repo default). Do NOT lift this to a workflow-level block.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7   # default persist-credentials keeps the token for `git push`

      - name: Collect every leg's box record
        uses: actions/download-artifact@v8
        with:
          pattern: bench-boxes-*
          path: benchmarks/boxes/
          merge-multiple: true

      - name: Bound each auto-recorded box's history (last 200 runs)
        run: |
          for f in benchmarks/boxes/gh-*/perf-history.jsonl; do
            [ -f "$f" ] || continue
            tail -n 200 "$f" > "$f.trim" && mv "$f.trim" "$f"
          done

      - name: Commit the per-box records (bot; golden stays human-reviewed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage ONLY the auto-managed gh-<runner> box dirs; -r skips git add when
          # none exist so the job can't error on an empty match.
          find benchmarks/boxes -maxdepth 1 -type d -name 'gh-*' -print0 | xargs -0 -r git add
          git diff --cached --quiet && { echo "no record changes"; exit 0; }
          git commit -m "chore(benchmarks): nightly per-box records [skip ci]"
          git push || { git pull --rebase origin main && git push; }

  # x86-64 macOS / Mach-O tier (clang). The Intel runners are scarce and slow, so
  # this corner of the {arch} x {OS} matrix runs nightly (and on manual
  # `workflow_dispatch`) instead of gating every push — the per-push `test` job
  # already covers arm64 macOS/Mach-O plus both Linux/ELF arches. Mirrors the
  # `test` job's steps exactly.
  # `macos-15-intel`, NOT `macos-13`: the macOS 13 image was retired 2025-12-08, so
  # a macos-13 leg never gets a runner — it silently queues, which for a nightly
  # job reads exactly like "the nightly is green". macos-15-intel is GitHub's
  # documented successor and the last x86_64 image (available until 2027-08).
  test-macos-x86:
    name: test (macos-15-intel, nightly)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-15-intel
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Toolchain versions
        run: |
          cc --version
          make --version | head -1
          uname -m

      - name: Build and run test suites
        run: make WERROR=1 test

      # xmllint validates the JUnit XML (incl. escaping of < & > " in failure
      # messages) in `make check`. Preinstalled on the runners, but make it
      # deterministic; macOS ships it natively.
      - name: Install xmllint (JUnit XML validation)
        run: if [ "$RUNNER_OS" = "Linux" ]; then sudo apt-get update && sudo apt-get install -y --no-install-recommends libxml2-utils; fi

      - name: Framework self-tests (meta-tests; assertions/runner/containment)
        run: make WERROR=1 check

      - name: Failure demo (informational; detects intentional failures)
        run: make demo-fail

      - name: Robustness demo (informational; hang/crash containment)
        run: make demo-robust

      - name: Benchmark demo (informational; cycles/call)
        run: make bench

      # The single-step native-trace tier runs live on a stock runner (baseline
      # EFLAGS.TF #DB -> SIGTRAP; no PMU/perf/privilege), and macOS-Intel is the one
      # front-end no Linux/Docker lane can exercise (Docker-on-Mac is Linux). This is
      # the only place the native-Darwin single-step path is regression-protected, so
      # guard both the C parity suite AND the per-binding reachability — the W^X
      # exec-memory helper (asmtest_hwtrace_exec_alloc) whose mmap/mprotect path is
      # x86-64-Darwin-enabled; without it every binding's live trace fails at alloc.
      # K1: the pinned build's exact installed file set is cached; a cold cache
      # (or unavailable backend) just builds from source as before.
      - name: Cache the pinned Capstone source build (K1)
        uses: actions/cache@v6
        with:
          path: ~/.cache/asmtest-thirdparty/capstone
          key: tp-capstone-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/build-capstone.sh', 'scripts/lib-thirdparty.sh', 'scripts/third-party-digests.txt', 'scripts/thirdparty-cache.sh') }}

      - name: Build + install Capstone from source (single-step block normalization)
        run: sh scripts/thirdparty-cache.sh cached-build capstone   # pinned source build; no brew/distro package; restores from the cache when warm

      - name: Native-trace single-step tier — C parity suite (live capture on Darwin)
        run: make hwtrace-test

      # Two independent FFIs over the same asmtest_hwtrace_exec_alloc symbol; both use
      # only preinstalled toolchains (clang, ruby), so no extra provisioning. The
      # Python lane is covered on the Linux `hwtrace` job; other bindings inherit the
      # fix wherever their toolchains exist on a macOS runner.
      - name: Native-trace single-step tier — language bindings (macOS-native path)
        run: make hwtrace-cpp-test hwtrace-ruby-test

  # macOS x86-64 DynamoRIO tier (macos-dynamorio-fork-build.md FB4 /
  # macos-dynamorio-port.md T11). DynamoRIO ships no macOS release asset, so this
  # lane builds the git-commit-pinned wilvk/dynamorio fork from source
  # (scripts/build-dynamorio-macos.sh; pin in scripts/third-party-digests.txt —
  # never a floating branch) and runs the M0 compiled-function/symbol harness
  # through it. Nightly/dispatch only, and OUTSIDE the `test` matrix, so a DR
  # failure never blocks the emulator tier (the plan's M2 requirement).
  drtrace-macos:
    name: drtrace (macOS x86-64, nightly)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-15-intel
    timeout-minutes: 90
    env:
      # Pin Xcode 16, exactly like upstream DynamoRIO's own ci-osx.yml on this
      # runner: the runner-default (newer) Apple clang breaks DR's option-type
      # token pasting (OPTION_TYPE_##bool -> OPTION_TYPE__Bool once bool is the
      # C17 stdbool macro _Bool) — measured on run 29899361267.
      DEVELOPER_DIR: /Applications/Xcode_16.app/Contents/Developer
    steps:
      - uses: actions/checkout@v7

      - name: Toolchain versions
        run: |
          cc --version
          cmake --version | head -1
          uname -m

      - name: Install DynamoRIO build deps (nasm, lz4)
        run: brew install nasm lz4

      # The prefix IS the fork's CMake build tree (see the build script header);
      # a warm cache at the pinned commit is reused via the script's commit
      # stamp, and any pin bump changes the key and rebuilds from scratch.
      - name: Cache the pinned DynamoRIO fork build
        uses: actions/cache@v6
        with:
          path: ~/dr
          key: dr-fork-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/build-dynamorio-macos.sh', 'scripts/third-party-digests.txt') }}

      - name: Build libdynamorio.dylib from the pinned fork
        run: scripts/build-dynamorio-macos.sh "$HOME/dr"

      - name: M0 harness — trace a compiled function through the fork runtime
        run: |
          make drtrace-test-macos DYNAMORIO_HOME="$HOME/dr" 2>&1 | tee drtrace-macos.log
          # Self-skip is failure here: this runner just BUILT the runtime, so a
          # "1..0 # skipped" would mean the lane silently stopped testing.
          if grep -q '^1\.\.0' drtrace-macos.log; then
            echo '::error::drtrace-test-macos self-skipped on the runner that built the runtime'
            exit 1
          fi

      # The drgate gate on an independent host (macos-dynamorio-signal-chaining):
      # the C harness above carries the SC1 signal-chaining guards, but the wedge
      # that motivated the fork's sigreturn fix was CPython's
      # test_drgate.py::test_signal_chaining — a signal delivered to a real
      # managed host while DR is attached. Running the pytest gate here keeps
      # signal chaining under attach regression-protected on a runner that is
      # not the dev box that landed the fix.
      - name: Install pytest (drgate gate)
        run: |
          python3 -m pip install pytest 2>/dev/null \
            || python3 -m pip install --user pytest 2>/dev/null \
            || python3 -m pip install --user --break-system-packages pytest

      - name: drgate gate — CPython signal chaining under attach (pytest)
        run: |
          set -o pipefail
          make drtrace-python-test DYNAMORIO_HOME="$HOME/dr" 2>&1 | tee drgate-macos.log
          # Same posture as the harness step: the runner just built the runtime,
          # so a self-skip (DR "not found", pytest skip, short collection) means
          # the managed-host gate silently stopped testing. test_drtrace.py
          # collects 3, test_drgate.py collects 4 — demand both full runs.
          if ! grep -q '3 passed' drgate-macos.log || ! grep -q '4 passed' drgate-macos.log; then
            echo '::error::drgate lane did not run all 3+4 pytest cases (self-skip or short collection)'
            exit 1
          fi
          if grep -qi 'skipped' drgate-macos.log; then
            echo '::error::drgate lane self-skipped on the runner that built the runtime'
            exit 1
          fi

  # x86-64 macOS / Mach-O on every push, without an Intel runner: the
  # Apple-Silicon `macos-latest` runner cross-builds the x86-64 slice with
  # `-arch x86_64` (a real x86-64 Mach-O, linked by the macOS linker) and the
  # kernel runs it under Rosetta 2 — exercising the genuine x86-64 Darwin ABI +
  # dyld load path that Unicorn can't see. This is the fast gating signal; the
  # nightly `test-macos-x86` job is the native-hardware backstop in case Rosetta
  # ever diverges. `bench` is omitted here (timings are meaningless under binary
  # translation); `test` + `check` carry the correctness coverage.
  test-macos-x86-rosetta:
    name: test (macos x86_64 / Rosetta)
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Ensure Rosetta 2
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Toolchain versions (x86_64 cross)
        run: |
          cc -arch x86_64 --version
          make --version | head -1
          echo "host $(uname -m) -> target x86_64 (executed via Rosetta 2)"

      - name: Build and run test suites (x86_64 Mach-O under Rosetta)
        run: make WERROR=1 CC="cc -arch x86_64" test

      - name: Framework self-tests (meta-tests; assertions/runner/containment)
        run: make WERROR=1 CC="cc -arch x86_64" check

  # Opt-in NASM backend (Intel syntax, x86-64 only).
  nasm:
    name: nasm (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Install nasm
        run: make deps DEPS_ARGS=--nasm

      - name: Build and run test suites (NASM backend)
        run: make ASM_SYNTAX=nasm WERROR=1 test

      - name: Framework self-tests (NASM backend)
        run: make ASM_SYNTAX=nasm WERROR=1 check

      - name: Failure demo (NASM backend)
        run: make ASM_SYNTAX=nasm demo-fail

      - name: Robustness demo (NASM backend)
        run: make ASM_SYNTAX=nasm demo-robust

      - name: Benchmark demo (NASM backend)
        run: make ASM_SYNTAX=nasm bench

  # Optional emulator tier (Unicorn Engine; x86-64 [incl. Win64 ABI], AArch64,
  # RISC-V, and ARM32 guests). Run on both x86-64 and arm64 hosts to exercise
  # the wrapper on each: the hand-assembled-byte guests (Win64, FP/SIMD, and the
  # AArch64/RISC-V/ARM32 cases) are host-independent and run everywhere, while
  # the x86-64 cases that drive the real host-compiled example routines run only
  # on an x86-64 host (they self-skip elsewhere — see REQUIRE_X86_HOST).
  emu:
    name: emu (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v7

      - name: Install libunicorn + pkg-config
        run: make deps DEPS_ARGS=--emu

      # K1: cache the exact file set the pinned source build installs, keyed on
      # the pinned inputs. Cold cache / unavailable backend: builds from source
      # exactly as before (the wrapper's cache mechanics are non-fatal).
      - name: Cache the pinned Capstone source build (K1)
        uses: actions/cache@v6
        with:
          path: ~/.cache/asmtest-thirdparty/capstone
          key: tp-capstone-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/build-capstone.sh', 'scripts/lib-thirdparty.sh', 'scripts/third-party-digests.txt', 'scripts/thirdparty-cache.sh') }}

      - name: Build and install Capstone from source (disassembler tier)
        run: sh scripts/thirdparty-cache.sh cached-build capstone   # pinned source build; no distro package used; restores from the cache when warm

      - name: Build and run emulator suite
        run: make emu-test

  # Optional in-line assembler tier (Keystone): assemble routines from strings
  # and run them through the emulator. Keystone produces real machine code for
  # the named guest, so every case is host-independent — run on both x86-64 and
  # arm64. Needs both libkeystone and libunicorn (the --asm dep set pulls both);
  # RISC-V self-skips where the packaged Keystone lacks that backend.
  asm:
    name: asm (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v7

      - name: Install libunicorn + pkg-config
        run: make deps DEPS_ARGS=--emu

      # K1: Keystone is a trimmed LLVM — the single most expensive source build
      # in the matrix — so cache its exact installed file set, keyed on the
      # pinned inputs. Cold cache / unavailable backend: builds as before.
      - name: Cache the pinned Keystone source build (K1)
        uses: actions/cache@v6
        with:
          path: ~/.cache/asmtest-thirdparty/keystone
          key: tp-keystone-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/build-keystone.sh', 'scripts/lib-thirdparty.sh', 'scripts/third-party-digests.txt', 'scripts/thirdparty-cache.sh') }}

      - name: Build and install Keystone from source
        run: sh scripts/thirdparty-cache.sh cached-build keystone   # no distro package; pinned source build; restores from the cache when warm

      - name: Build and run in-line assembler suite
        run: make asm-test

  # Optional DynamoRIO in-process native-trace tier (Linux x86-64). Installs a
  # pinned DynamoRIO release and runs the standalone C smoke harness + the Python
  # language-wrapper suite. DynamoRIO is a software DBI engine (runs on the CI VM's
  # CPU); the tier self-skips cleanly if the install step is removed. See
  # docs/internal/plans/dynamorio-native-trace-plan.md (Phase 8).
  drtrace:
    name: drtrace (DynamoRIO native trace)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DR_VERSION: 11.91.20630
    steps:
      - uses: actions/checkout@v7

      - name: Install build deps (python3 + pytest for the wrapper)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake python3 python3-pytest

      - name: Fetch a pinned DynamoRIO release (digest-verified)
        # Through the repo's own fetch script, not a raw curl: the tarball's
        # SHA-256 must match scripts/third-party-digests.txt (the Dockerfile
        # lanes route through the same script).
        run: echo "DYNAMORIO_HOME=$(sh scripts/fetch-dynamorio.sh)" >> "$GITHUB_ENV"

      - name: Build + run the C native-trace smoke harness
        run: make drtrace-test DYNAMORIO_HOME="$DYNAMORIO_HOME"

      - name: Build + run the Python native-trace wrapper suite
        run: make drtrace-python-test DYNAMORIO_HOME="$DYNAMORIO_HOME"

  # Intel SDE future/absent-ISA lane (pin-sde-future-isa-lane). Container-first:
  # the pinned, digest-gated tools (SDE 10.8.0 + APX-capable GAS 2.46.1 + NASM
  # 3.02) all live in Dockerfile.sde, so the runner needs only Docker. SDE emulates
  # ISA the host CPU lacks (APX/AVX10.2/AMX/AVX-512-on-AVX2) for the whole process,
  # so `make docker-sde` runs the suite under `sde64 -future`: the transparency
  # null test (native == SDE TAP), the APX fixtures that cannot run any other way,
  # the AVX-512-on-AVX2 un-skip, and the Unicorn cross-check. ubuntu-latest runners
  # are x86-64, so the lane executes rather than skipping. No macOS leg: SDE ships
  # Linux/Windows kits only (if one is ever added it must use macos-15-intel, never
  # the retired macos-13).
  sde:
    name: sde (Intel SDE future/absent-ISA lane)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Build the SDE image + run the suite under sde64 -future
        run: make docker-sde

  # libFuzzer / AFL++ external-engine coverage shim (libfuzzer-afl-shim, Track E).
  # The lane existed (`make docker-fuzz`) but no workflow ran it — a whole
  # capability tier unexercised, contrary to the repo's anti-vacuity posture
  # (2026-07-21 review K4). fuzz-shim-test is a REAL bounded test, never a
  # self-skip: it fails unless BOTH engines steer to their planted crash
  # (~1 min of fuzzing on top of the harness builds).
  fuzz:
    name: fuzz (libFuzzer + AFL++ coverage shim)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Build the fuzz image + run the bounded shim test
        run: make docker-fuzz

  # DynamoRIO extension-load probe (data-flow taint tier, Increment 2). The
  # Phase-5 taint re-platform onto inlined drmgr/drreg/drx instrumentation is
  # gated on those prebuilt extensions loading under DR's private loader — a
  # blocker documented generically ("modern glibc") but never empirically tested.
  # This job builds the throwaway probe (drclient/probe_extensions.c) and runs it
  # under drrun, failing red if any of drmgr/drreg/drx fails to load or the
  # instrumented-instruction count is zero. It stays on the BSD-clean stack only:
  # umbra is LGPL-2.1 (Dr. Memory Framework), so its load-check is opt-in
  # (PROBE_UMBRA=1) and NOT part of this gate. See
  # docs/internal/analysis/dr-extension-load-probe-findings.md.
  drext-probe:
    name: drext-probe (DR extension private-loader check)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DR_VERSION: 11.91.20630
    steps:
      - uses: actions/checkout@v7

      - name: Install build deps (cmake)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake

      - name: Record the runner glibc (the blocker is a glibc-version claim)
        run: ldd --version | head -1

      - name: Fetch a pinned DynamoRIO release
        run: |
          url="https://github.com/DynamoRIO/dynamorio/releases/download/cronbuild-${DR_VERSION}/DynamoRIO-Linux-${DR_VERSION}.tar.gz"
          curl -fsSL "$url" -o /tmp/dr.tar.gz
          mkdir -p "$HOME/dynamorio"
          tar -xzf /tmp/dr.tar.gz -C "$HOME/dynamorio" --strip-components=1

      - name: Build + run the extension-load probe (drmgr/drreg/drx)
        run: make drext-probe DYNAMORIO_HOME="$HOME/dynamorio"

  # In-band DynamoRIO taint tier (data-flow taint, Increments 4-5). Two containerized
  # lanes, each self-contained (its image installs its own DynamoRIO + Capstone/Unicorn
  # or .NET SDK; both self-skip cleanly if DynamoRIO were absent):
  #   docker-taint-native  the in-process inline-taint-vs-emulator-forward-slice oracle
  #                         diffs + negative controls, AND the launch-under-DR native
  #                         workload with a POSIX-shm channel drained + oracle-diffed by a
  #                         separate out-of-process validator.
  #   docker-taint-dotnet   the drrun-over-dotnet coexistence smoke — the first in-tree
  #                         test of DR's code cache against .NET's tiered JIT (the plan's
  #                         risk concentration): a managed workload whose hot method tiers
  #                         up mid-run must run to completion with no SIGTRAP/SIGSEGV/crash.
  # See docs/internal/plans/dynamorio-taint-tier-plan.md, Increments 4-5.
  taint:
    name: taint (DR in-band taint tier)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: In-band taint — Inc4 oracle diffs + Inc5 native launch-under-DR + shm + Inc8 SIMD + Inc9 HARD BAND GATE
        run: make docker-taint-native

      - name: dotnet launch coexistence — .NET tiered-JIT vs DR code cache
        run: make docker-taint-dotnet

  # libdft64 DIFFERENTIAL taint oracle (data-flow taint, track PIN-4). A self-contained
  # containerized lane that cross-validates the shipped DR in-band taint client against a
  # SECOND, independently-implemented byte-level taint engine — libdft64 on Intel Pin — by
  # running the same seed/sink fixtures through both and asserting byte-for-byte sink
  # agreement on the GP/integer-memory subset, with libdft's documented blind spots as named
  # skips. A pure Docker lane (no hardware, no credentials): the pinned Pin 3.20 kit +
  # libdft64 are fetched + digest-gated at build time and are test/oracle-only, never bundled.
  # Pin's kit is x86-64 gcc-linux, so the lane self-skips on non-x86 — no macOS leg (the
  # retired macos-13 is never used; if an Intel-mac leg were ever wanted the id is
  # macos-15-intel). See docs/internal/implementations/pin-libdft-taint-oracle.md.
  taint-oracle:
    name: taint (libdft64 differential oracle)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: DR ≡ libdft64 — differential taint oracle (Pin 3.20 + libdft64)
        run: make docker-taint-oracle

  # GC-move taint SURVIVAL (data-flow taint, Increment 7 Slice 2 + the Increment-9 GC-survival
  # gate). A self-contained image (DynamoRIO + .NET SDK + git for the pinned CoreCLR profiler
  # headers) that runs, under `drrun -c <taint client>`: the in-process MovedReferences2 profiler
  # coexistence probe; the live GC-move remap driven by that profiler on real compacting GCs; and
  # the seed->move->sink SURVIVAL lane — a taint seed on a GC-movable managed object survives a
  # compacting GC (the DR-API-free raw-mmap leaf allocator carries the tag into the moved-into
  # leaf) and the sink still fires at the object's NEW address. Self-skips cleanly without the
  # .NET SDK / git / network. See dynamorio-taint-tier-plan.md Increments 7 + 9.
  taint-gcmove:
    name: taint (GC-move survival)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7

      - name: GC-move survival — profiler-fed live remap + managed seed->move->sink
        run: make docker-gcprofiler-probe

  # DR ATTACH tier (Increments 1, 3-5) — attach the taint tracer to a NATIVE process that is
  # already running and that we did not start, configure it entirely from outside (the target
  # calls no markers), capture a bounded window, then detach and leave it running native.
  #
  # These increments landed with docker lanes but no CI job, so five increments' worth of
  # capability had no regression gate while the launch-only tier next door had four. The
  # external-attach image is the reason: it needs --cap-add=SYS_PTRACE for the seize, and its
  # in-file comment still describes it as the Increment-2 research probe — "a manual
  # diagnostic, not in the main gate". That was true when written, but Increments 4 and 5 were
  # later added to the SAME image, so landed capability inherited a research probe's CI
  # posture. A hosted runner grants SYS_PTRACE, so the gate is affordable:
  #   docker-taint-attach        cooperative dr_app_* attach/detach (Inc 1) + the marker-less
  #                              interactive nudge arm/disarm (Inc 3). Plain run, no caps.
  #   docker-taint-attach-probe  `drrun -attach <pid>` into a RUNNING native victim (Inc 2's
  #                              GO probe), then Inc 4's marker-less external taint capture and
  #                              Inc 5's K=3 attach/capture/detach cycling over ONE pid with the
  #                              shadow-leaf leak assertion between rounds.
  #
  # The two MANAGED probes (docker-taint-managed-attach-probe, docker-suspendprof-probe) stay
  # OUT by design: they are throwaway diagnostics that record a reproducible NO-GO (DR's seize
  # of a running .NET trips glibc stack-smashing; parking managed threads at safepoints does
  # not help, because the fatal takeover is the runtime's NATIVE threads), not capability to
  # protect. See docs/internal/archive/plans/dynamorio-attach-tier-plan.md.
  taint-attach:
    name: taint (DR attach tier)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Cooperative attach (Inc 1) + marker-less nudge arm/disarm (Inc 3)
        run: make docker-taint-attach

      - name: External attach (Inc 2) + marker-less taint capture (Inc 4) + K-round detach cycling (Inc 5)
        run: make docker-taint-attach-probe

  # F4 — live GC-move canonicalization on the ptrace ATTACH tier (Increments 1 and 2). This is
  # the WIRING that joins the proven profiler GC-move feed to the landed pure transform
  # (asmtest_gcmove_canonicalize) on a live attach, and it is the one place that tier can be
  # WRONG rather than merely slow: without it a managed value's memory def-use edge silently
  # VANISHES across a compaction. It landed with `make docker-gccanon-attach` as its only proof
  # and no CI job — the same "landed capability inherited a research probe's CI posture" the
  # taint-attach job above exists to fix. Same runner and needs as taint-gcmove next door (a
  # hosted runner grants the SYS_PTRACE the sibling-process seize needs), so the gate is
  # affordable. The lane is ~3 minutes of live dotnet + ptrace locally; the timeout is generous.
  #
  # THE GATE MUST NOT BE VACUOUS. The lane SELF-SKIPS with `1..0 # skipped` AND EXIT 0 when the
  # dotnet SDK / git / capstone are absent, when the CoreCLR profiler-header fetch fails, or when
  # the Microsoft.Diagnostics.NETCore.Client restore fails (the $(BUILD)/.gccanon_skip sentinel in
  # mk/native-trace.mk). A plain `run: make docker-gccanon-attach` would therefore go GREEN having
  # tested NOTHING. So the run is captured and echoed (failures stay debuggable), the skip
  # sentinel is a HARD failure, any `not ok` is a failure, and the exact assertion count is
  # asserted: the pure `--selftest` plan `1..5`, then one phase per GCCANON_PHASES value —
  # `1..10` / `1..11` / `1..11` for 1, 2 and 3 compacting GCs per call-out window = 37 `ok`,
  # plus the T5 alias phase `1..6` (object-identity severs a false address-aliased edge) = 43 `ok`.
  # See docs/internal/plans/live-attach-dataflow-followup-plan.md.
  gccanon-attach:
    name: dataflow (F4 live GC-move canon, attach tier)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7

      - name: F4 — live GC-move canon on a ptrace attach (selftest + 1, 2 and 3 GCs per window)
        run: |
          set -o pipefail
          make docker-gccanon-attach 2>&1 | tee /tmp/gccanon.log

      - name: Assert the lane really ran (no self-skip) and every assertion passed
        run: |
          log=/tmp/gccanon.log
          if grep -q '1\.\.0 # skipped' "$log"; then
            echo "::error::gccanon-attach SELF-SKIPPED (1..0 # skipped) — the F4 gate tested NOTHING. Either a tool is missing (dotnet SDK / git / capstone) or the CoreCLR-header fetch / NETCore.Client restore failed. Fix the lane; do not let this pass silently."
            exit 1
          fi
          if grep -q '^not ok' "$log"; then
            echo "::error::gccanon-attach reported FAILING assertions:"
            grep '^not ok' "$log"
            exit 1
          fi
          n=$(grep -c '^ok ' "$log" || true)
          if [ "$n" -ne 43 ]; then
            echo "::error::gccanon-attach ran $n assertions, expected 43 (selftest 1..5 + phases 1..10 / 1..11 / 1..11 for 1, 2 and 3 GCs per call-out window + T5 alias phase 1..6). A phase did not run, or the lane changed shape — if the change is intended, update this count."
            exit 1
          fi
          echo "gccanon-attach: 43/43 assertions — pure selftest + live 1, 2 and 3 GCs per call-out window + object-identity alias phase."

  # Optional hardware-assisted trace tier. The live capture backends (Intel PT,
  # ARM CoreSight, AMD LBR) need bare-metal hardware that GitHub-hosted runners do
  # not expose, so they self-skip — but the AMD branch-record RECONSTRUCTION is
  # validated with synthetic inputs against the Capstone layer, and the full
  # detect-and-skip gating chain is exercised. A self-hosted bare-metal job (Intel
  # PT / AMD Zen 3+ / AArch64 CoreSight) is a separate, allowed-to-be-absent lane.
  hwtrace:
    name: hwtrace (decode + self-skip gating)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Install Capstone (AMD reconstruction) + libipt (PT decode) + OpenCSD
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libcapstone-dev libipt-dev libopencsd-dev pkg-config python3 python3-pytest

      - name: Build + run the hardware-trace suite (decode validated; capture self-skips)
        run: make WERROR=1 hwtrace-test

      # The Python single-step wrapper (incl. the scoped-tracing `HwTrace.scope`
      # case) is excluded from the docker matrix (HWTRACE_DOCKER_LANGS), so run it
      # here against the shared lib the recipe builds — otherwise it runs only
      # locally. Self-skips off x86-64 Linux.
      - name: Python wrapper (single-step + scoped tracing)
        run: make WERROR=1 hwtrace-python-test

  # The out-of-process ptrace single-step tracer, run LIVE on a REAL AArch64 VM.
  # ubuntu-24.04-arm is Azure Cobalt 100 (Neoverse-N2), NOT qemu — the `test`/`cli`/
  # `emu` jobs already use it — so the ptrace tracer/tracee single-step stream executes
  # natively for the first time here. The x86 `hwtrace` job only builds+gates on
  # ubuntu-latest; this is the aarch64 half. No libipt (x86-only PT decode); Capstone
  # from the pinned 5.0.1 source build (apt's Capstone 4 degrades disassembly). The
  # assert step makes a silent qemu-style self-skip a RED build — the whole point is
  # that the stream ran, not that it was skipped. (aarch64-ptrace-single-step-validation T1.)
  hwtrace-arm64:
    name: hwtrace (AArch64 ptrace stream, live)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    # GATING since 2026-07-20: the first green live run (a53b5df) executed the whole
    # ptrace tier on real silicon — 205 ok assertions, zero unexpected skips — after
    # the hardening pass fixed five arch assumptions (frame_insns_eq -Werror,
    # test_debug_logging, stealth_window_inline + register_idempotent x86-fixture
    # SIGILLs, and the callout fixture's x30 clobber, which looped tracer+tracee
    # in-region forever). Measured T2 outcome on this runner: NT_ARM_HW_BREAK is
    # ARMED-BUT-SILENT (slots reported, arm accepted, debug exception withheld by
    # the hypervisor) — the forced-hw call-out self-skips with that named reason;
    # bare-metal arm64 validation is self-hosted-ci-runners territory.
    steps:
      - uses: actions/checkout@v7

      - name: Install OpenCSD + pkg-config + python (no libipt — x86-only PT decode)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libopencsd-dev pkg-config python3 python3-pytest

      - name: Cache the pinned Capstone source build
        uses: actions/cache@v6
        with:
          path: ~/.cache/asmtest-thirdparty/capstone
          key: tp-capstone-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/build-capstone.sh', 'scripts/lib-thirdparty.sh', 'scripts/third-party-digests.txt', 'scripts/thirdparty-cache.sh') }}

      - name: Build and install Capstone from source (disassembler tier)
        run: sh scripts/thirdparty-cache.sh cached-build capstone   # pinned source build; restores from the cache when warm

      - name: Build + run the hardware-trace suite LIVE (ptrace tier must NOT self-skip)
        run: |
          set -o pipefail
          make WERROR=1 hwtrace-test 2>&1 | tee /tmp/hwtrace-arm64.log

      - name: Assert the ptrace stream ran LIVE (no qemu self-skip, no failures, floor)
        run: |
          log=/tmp/hwtrace-arm64.log
          # (1) The qemu/emulation self-skip string must NEVER appear on real silicon —
          #     if it does, PTRACE_SINGLESTEP was non-functional and the stream proved nothing.
          if grep -q 'AArch64 PTRACE_SINGLESTEP is non-functional' "$log"; then
            echo "::error::hwtrace-arm64: the ptrace tier SELF-SKIPPED with the qemu-emulation reason on a REAL AArch64 runner — the live single-step stream tested NOTHING. Investigate PTRACE_SINGLESTEP on this runner (probe_singlestep in src/ptrace_backend.c)."
            exit 1
          fi
          # (2) Any failing assertion is a hard failure.
          if grep -q '^not ok' "$log"; then
            echo "::error::hwtrace-arm64 reported FAILING assertions:"
            grep '^not ok' "$log"
            exit 1
          fi
          # (3) Only these SKIPs are expected on a real AArch64 VM (by name, never blanket):
          #   Intel PT capture/decode (not GenuineIntel; libipt not installed) · AMD LBR / IBS
          #   (not AMD) · ARM CoreSight (no cs_etm PMU on the Azure hypervisor) · in-process
          #   single-step / BTF block-step (x86-only MSR/DEBUGCTL; PTRACE_SINGLEBLOCK has no
          #   AArch64 form) · codeimage eBPF (built without libbpf) · the forced-hardware
          #   'hardware bp' call-out — with T2's NT_ARM_HW_BREAK arm-and-fire probe it self-skips
          #   only when it MEASURES no debug slots or an armed-but-silent hypervisor (both carry
          #   'NT_ARM_HW_BREAK' in the reason); where the breakpoint fires it runs live (ok, no skip).
          #   Three more by-name entries, found by replaying this grep offline against the
          #   run-29739614837 log (the assert step itself had never reached a full log before
          #   the callout-fixture hang was fixed): the stealth-window thread pair ("needs
          #   x86-64 Linux threads"), the in-process single-step live capture ("single-step
          #   backend is x86-64 Linux/macOS only"), and the options-ABI guard's non-x86 arm
          #   ("single-step tier not on this arch/OS") — all honestly x86-only tiers.
          allow='not Linux x86-64|x86-64 Linux only|x86-64 only|Linux x86-64|Intel PT|intel_pt|GenuineIntel|libipt|wholewindow|window ladder|AMD|IBS|ibs precover|CoreSight|cs_etm|in-process|BTF|SINGLEBLOCK|block-step|blockstep|libbpf|soft-dirty|codeimage|descent|call_auto|pt attach|pt live|pt window|pt image|single-step unavailable|no in-process single-step|register-idempotent|debug logging|hardware bp|hardware breakpoints are x86-64|NT_ARM_HW_BREAK|MSR|msr|needs x86-64 Linux threads|single-step backend is x86-64|single-step tier not on this arch/OS'
          unexpected=$(grep '# SKIP' "$log" | grep -vE "$allow" || true)
          if [ -n "$unexpected" ]; then
            echo "::error::hwtrace-arm64: UNEXPECTED # SKIP lines (not on the by-name allowlist) — a tier that should run live self-skipped. Triage, then either fix the tier or add the reason to the allowlist:"
            echo "$unexpected"
            exit 1
          fi
          # (4) Pass-count floor (backstop against 'the suite did not run').
          n=$(grep -c '^ok ' "$log" || true)
          floor=200  # first green live run 2026-07-20 (a53b5df): 205 ok assertions
          if [ "$n" -lt "$floor" ]; then
            echo "::error::hwtrace-arm64 ran $n ok assertions (< floor $floor) — the suite did not execute the ptrace stream."
            exit 1
          fi
          echo "::notice::hwtrace-arm64: $n ok assertions, ptrace tier ran LIVE on AArch64, no unexpected skips."
          # (5) T2 (SS-A64-STREAM): surface the MEASURED NT_ARM_HW_BREAK outcome — the
          #     decisive, previously-undetermined answer to "does Azure's arm64 hypervisor
          #     deliver a hardware-breakpoint debug exception?". All three are green; the
          #     notice records which, to carry verbatim into the T6 docs/plan flip.
          if grep -qE '^ok .*ptrace callout \(hardware bp\): trace_call over a region' "$log"; then
            echo "::notice::hwtrace-arm64 NT_ARM_HW_BREAK: FIRES — the forced-hardware call-out ran LIVE on this runner (real debug-register breakpoint delivered)."
          elif grep -q 'ptrace callout (hardware bp): no NT_ARM_HW_BREAK slots' "$log"; then
            echo "::notice::hwtrace-arm64 NT_ARM_HW_BREAK: NO SLOTS — this runner reports zero debug breakpoint registers (dbg_info & 0xff == 0)."
          elif grep -q 'ptrace callout (hardware bp): NT_ARM_HW_BREAK armed but never fired' "$log"; then
            echo "::notice::hwtrace-arm64 NT_ARM_HW_BREAK: ARMED-BUT-SILENT — slots present but the hypervisor withholds the debug exception; bare-metal validation moves to self-hosted-ci-runners."
          fi

      # T5 (aarch64-ptrace-single-step-validation): python is not in
      # HWTRACE_DOCKER_LANGS (it runs on the host job in the x86 lane too), so this
      # step is its ONLY arm64 lane — the wrapper's T4 A64 ptrace fixtures live.
      - name: Python wrapper LIVE on AArch64 (single-step self-skips; ptrace toolkit live)
        run: make WERROR=1 hwtrace-python-test

  # The nine COMPILED binding lanes' HWTRACE suites, natively on the arm64 runner
  # (T5, aarch64-ptrace-single-step-validation): on an arm64 host DOCKER_PLATFORM
  # stays empty, so mk/docker.mk builds and runs linux/arm64 images directly — the
  # T4 AArch64 ptrace fixtures execute live for the first time. Runs
  # `docker-hwtrace-bindings-only`, which builds each image but runs ONLY
  # `make hwtrace-<lang>-test` — NOT the base binding conformance suite (the image's
  # default CMD, run by the plain `docker-<lang>` target). That base suite exercises
  # the x86-64 Unicorn emulator guest, AVX corpus routines, and x86 flag semantics;
  # porting those nine conformance suites to AArch64 is the `bindings` job's
  # territory (x86-only today) and a separate effort — out of scope for this doc,
  # which validates the ptrace single-step STREAM. The dotnet lane self-skips
  # WHOLESALE via its top-level '# SKIP single-step backend unavailable' gate
  # (HwTraceProgram.cs Main gates on the x86-only in-process backend before its
  # ptrace subset — relaxing that is a recorded follow-on), so that named skip is
  # the ONE allowed unavailability line; the other eight lanes must run their
  # ptrace tier live.
  hwtrace-bindings-arm64:
    name: hwtrace-bindings (AArch64, live)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    env:
      # K1-style buildx layer cache for the shared bindings-base image, in a
      # DISTINCT scope from the x86 job — one shared scope would poison/thrash
      # both caches with foreign-arch layers.
      DOCKER_BASE_BUILD: >-
        docker buildx build --load
        --cache-from type=gha,scope=asmtest-bindings-base-arm64
        --cache-to type=gha,scope=asmtest-bindings-base-arm64,mode=max,ignore-error=true
    steps:
      - uses: actions/checkout@v7
      - name: Probe Docker (whether the arm64 image ships it is not publicly documented)
        run: |
          if ! docker version >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends docker.io
            sudo systemctl start docker
          fi
          docker version
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Expose the Actions runtime to buildx (gha cache backend)
        uses: actions/github-script@v9
        with:
          script: |
            for (const k of ['ACTIONS_CACHE_URL', 'ACTIONS_RESULTS_URL', 'ACTIONS_CACHE_SERVICE_V2', 'ACTIONS_RUNTIME_TOKEN']) {
              if (process.env[k]) core.exportVariable(k, process.env[k]);
            }
      - name: Trace every compiled wrapper's HWTRACE suite natively on AArch64 (ptrace tier LIVE)
        run: |
          set -o pipefail
          make docker-hwtrace-bindings-only 2>&1 | tee /tmp/hwb-arm64.log
      - name: Assert the ptrace tier ran LIVE (no unavailability skips, every lane present)
        run: |
          log=/tmp/hwb-arm64.log
          # (1) The qemu-emulation self-skip reason must NEVER print on real silicon.
          if grep -q 'AArch64 PTRACE_SINGLESTEP is non-functional' "$log"; then
            echo "::error::hwtrace-bindings-arm64: a lane self-skipped with the qemu-emulation reason on a REAL AArch64 runner — its live fixtures tested nothing."
            grep -n 'AArch64 PTRACE_SINGLESTEP is non-functional' "$log"
            exit 1
          fi
          # (2) No lane that RUNS its ptrace tier may report it UNAVAILABLE — where the
          #     tier runs on a native arm64 VM the stepper is live. Bindings split two ways:
          #     go + java run the ptrace toolkit before any single-step gate, so their T4
          #     A64 fixtures execute live here; cpp/node/zig/lua/ruby/rust/dotnet gate their
          #     WHOLE hwtrace suite on the x86-only in-process single-step backend and so
          #     self-skip on arm64 with 'single-step backend unavailable' (never reaching
          #     their ptrace section — running THAT live is a per-binding follow-on). The
          #     first set must never print a ptrace-unavailability string; the make step
          #     itself already fails (exit propagates through docker) if their assertions
          #     regress, so this is the silent-skip backstop.
          if grep -nE 'ptrace backend unavailable|ptrace toolkit unavailable|out-of-process ptrace (tier|toolkit) .?unavailable|ptrace unavailable' "$log"; then
            echo "::error::hwtrace-bindings-arm64: a running binding's ptrace tier self-skipped as UNAVAILABLE on real AArch64 — its T4 live fixtures never executed. Triage the lane above."
            exit 1
          fi
          # (3) Every lane actually ran — its banner must be present (a lane silently
          #     dropped from the aggregate would otherwise pass by absence).
          for lang in cpp rust go node java dotnet ruby lua zig; do
            if ! grep -q "== hwtrace-$lang-test ==" "$log"; then
              echo "::error::hwtrace-bindings-arm64: lane $lang never ran (no '== hwtrace-$lang-test ==' banner in the log)."
              exit 1
            fi
          done
          # (4) Non-vacuity: go + java are the two lanes that RUN the ptrace tier live on
          #     arm64 (the others gate wholesale on single-step). At least their suites must
          #     have executed live assertions — a green run where BOTH silently degraded to
          #     the single-step skip would defeat the point.
          if ! grep -q '^ok .*github.com/wilvk/asm-test/bindings/go' "$log"; then
            echo "::error::hwtrace-bindings-arm64: the go lane did not report a passing package run — its live arm64 ptrace tier did not execute."
            exit 1
          fi
          echo "::notice::hwtrace-bindings-arm64: go + java ran the out-of-process ptrace tier LIVE on AArch64 (T4 A64 fixtures); cpp/node/zig/lua/ruby/rust/dotnet self-skip on their x86-only in-process single-step gate (running their ptrace section live on arm64 is a recorded per-binding follow-on)."

  # asmspy, the ncurses front-end over the out-of-process tracer (cli/). The
  # headless smoke drives every non-interactive subcommand (--list/--syms/
  # --trace/--stream/--log) against the example victims; the TUI shares the
  # same engine, so this is the whole CLI surface CI can exercise. The victims
  # opt in via PR_SET_PTRACER_ANY, so ptrace attach works under the runner's
  # default yama scope. Same dependency set as the hwtrace job, plus ncurses.
  cli:
    name: cli (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    # GATING ON BOTH ARCHES since 2026-07-22. The arm64 leg was staged non-blocking
    # while the AArch64 asmspy smoke was hardened for its first live runs
    # (asmspy-aarch64-support T2/T7), mirroring how hwtrace-arm64 was staged before it
    # went gating. The bring-up flushed out and fixed a string of real x86 assumptions
    # live: the SYS_stat/dup2 legacy-syscall gaps (arm64 uses newfstatat/dup3), the
    # x86-only jit-victim HOT_CODE + host-arch disassembly, and the
    # R_AARCH64_JUMP_SLOT / 2-slot-PLT0 stub resolution. The last two items were a
    # misattribution and a host fact, both settled ON the runner:
    #
    #   - the "--stream --tid= filter is flaky on a contended vCPU" item was not about
    #     --tid at all. The whole-process --stream control run before it was KILLING
    #     the target: on AArch64 a step armed on a thread parked in a blocking syscall
    #     survives PTRACE_DETACH and fires as a fatal SIGTRAP when that syscall returns
    #     (~200-400 ms later), so --tid found a corpse and wore the blame. Fixed by
    #     step_resume() — PTRACE_SYSCALL, never a step, for a thread poised on an svc.
    #   - --trace --tid= and --watch need debug registers this runner will not grant:
    #     NT_ARM_HW_BREAK reports 6 slots and NT_ARM_HW_WATCH 4 (debug_arch=8), yet
    #     PTRACE_SETREGSET on either returns ENOSPC. asmspy now names that measured
    #     reason and self-skips; the smoke asserts the honest outcome (an unarmable
    #     entry is an attach failure, never a false "never executed") instead of
    #     demanding a sample the host cannot produce.
    #
    # Root cause + the asmspy-free reproducers: asmspy-aarch64-support.md T2/T7.
    # If this leg goes red on a flake, report it — do NOT quietly re-add
    # continue-on-error. That is what hid a target-killing bug for weeks.
    strategy:
      fail-fast: false
      matrix:
        # asmspy runs on Linux x86-64 AND AArch64 (the reg/step/detach shim in
        # cli/asmspy_arch.h). ubuntu-24.04-arm is a REAL VM (Azure Cobalt 100 /
        # Neoverse N2), not qemu, so the ptrace tracer/tracee single-step engines
        # run natively there — the correct validation vehicle for the AArch64 half.
        os: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v7

      # Capstone comes from the pinned 5.0.1 source build (the version the docs
      # and the docker CLI image ship), NOT apt's Capstone 4 — the older library
      # silently degrades some disassembly, so the smoke must run against what
      # users actually get. OpenCSD/ncurses/pkg-config stay apt.
      # libipt (Intel PT decoder) is an x86-only apt package — its absence just
      # leaves LIBIPT_LIBS empty (mk/native-trace.mk header-probes it), so it is
      # installed ONLY on x86-64. gcc-multilib builds the -m32 i386 victim for the
      # EI_CLASS-refusal check; there is no -m32 on arm64 (the i386-refusal block
      # self-drops via mk/cli.mk's parse-time probe), so it too is x86-only.
      - name: Install hwtrace decoders + ncurses (TUI) + pkg-config (+ libipt/gcc-multilib on x86-64)
        run: |
          sudo apt-get update
          if [ "$(uname -m)" = "x86_64" ]; then
            sudo apt-get install -y --no-install-recommends libipt-dev libopencsd-dev libncurses-dev pkg-config gcc-multilib
          else
            sudo apt-get install -y --no-install-recommends libopencsd-dev libncurses-dev pkg-config
          fi

      # K1: cache the exact file set the pinned source build installs, keyed on
      # the pinned inputs. Cold cache / unavailable backend: builds from source.
      - name: Cache the pinned Capstone source build (K1)
        uses: actions/cache@v6
        with:
          path: ~/.cache/asmtest-thirdparty/capstone
          key: tp-capstone-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/build-capstone.sh', 'scripts/lib-thirdparty.sh', 'scripts/third-party-digests.txt', 'scripts/thirdparty-cache.sh') }}

      - name: Build + install the pinned Capstone 5.0.1 from source (disassembler)
        run: sh scripts/thirdparty-cache.sh cached-build capstone   # pinned source build; no distro package used; restores from the cache when warm

      - name: Build asmspy + victims, run the headless smoke
        run: make WERROR=1 cli-smoke

  # The data-flow analysis tier: build libasmtest_dataflow (the pure L0/L1/L2
  # pipeline) and run the host-toolchain language bindings against it (Phase 6).
  # Python (ctypes) + C++ (header-only) need only Capstone + the stock ubuntu
  # python3/g++; the Node (koffi) binding is exercised in the docker bindings
  # lane, matching this repo's node-in-docker pattern.
  #
  # This job ran ONLY the two binding smokes for a long time, which left the C suite the
  # bindings sit on top of — test_dataflow, test_dataflow_method, test_dataflow_gcmove,
  # test_dataflow_helpers, test_operands, test_dataflow_emu and test_dataflow_ptrace — with no
  # CI gate at all, plus F1 increment 1's block-step suite, which was not even wired into the
  # `dataflow-test` aggregate. The C suite is added below through the docker-dataflow-attach
  # lane rather than the host toolchain, because the lane's image is what makes the run
  # NON-vacuous: it installs libunicorn (so test_dataflow_emu and the block-step oracle compare
  # for real instead of taking their no-unicorn SKIP) and runs with seccomp=unconfined (so the
  # PTRACE_SEIZE attach path in test_dataflow_ptrace actually EXECUTES instead of self-skipping
  # DF_PTRACE_ETRACE). The host runner has neither, so a host `make dataflow-test` would skip
  # exactly the parts most worth gating. Verified locally: 8 suites, 257 assertions, 0 skips.
  dataflow:
    name: dataflow (analysis lib + bindings)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Install Capstone (the operand enumerator the analysis lib links)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libcapstone-dev pkg-config

      - name: Build libasmtest_dataflow + run the Python and C++ bindings
        run: |
          make WERROR=1 dataflow-python-test
          make WERROR=1 dataflow-cpp-test

      # The C suite under the analysis lib, in the one image where none of it self-skips:
      # unicorn present (emulator oracle) + seccomp=unconfined (live PTRACE_SEIZE attach).
      # Includes F1 increment 1's block-step suite, now chained into the dataflow-test
      # aggregate (mk/dataflow.mk).
      - name: Build + run the C data-flow suite (incl. F1 inc 1 block-step) in the attach lane
        run: |
          set -o pipefail
          make docker-dataflow-attach 2>&1 | tee /tmp/dataflow-attach.log

      # Same anti-vacuity posture as the gccanon-attach gate: every suite here degrades to a
      # clean SKIP rather than a failure when its dependency is missing, so "green" alone
      # proves nothing. Assert the skips did NOT happen.
      - name: Assert the C suite really ran (nothing self-skipped) and every assertion passed
        run: |
          log=/tmp/dataflow-attach.log
          # TWO skips are expected here, each an environmental hardware fact, not a lapse:
          #  (1) GitHub's runners are VMs whose hypervisor MASKS BTF/DEBUGCTL, so PTRACE_SINGLEBLOCK
          #      is non-functional and the live block-step/replay tier (F1 increment 1) self-skips.
          #  (2) No CI/AMD host exposes an intel_pt PMU, so F5's `pt live replay` leg
          #      (dataflow-pt-replay-tier T4) self-skips — it needs bare-metal Intel PT silicon.
          # Both run for real on the right hardware (F1 inc 1 on bare metal, verified 22/22 on a
          # Zen 5 host; F5 pt-live on an Intel-PT box), so both are HOST-gated, not CI-gated —
          # recorded in live-attach-dataflow-followup-plan.md F1 / dataflow-pt-replay-tier.md T4.
          # Every OTHER skip is still a hard failure: allow these two BY NAME, never blanket.
          if grep '^# SKIP' "$log" | grep -qvE 'live block-step/replay|pt live replay'; then
            echo "::error::the data-flow C suite SELF-SKIPPED — the gate tested less than it claims:"
            grep '^# SKIP' "$log" | grep -vE 'live block-step/replay|pt live replay'
            exit 1
          fi
          if grep -q '^# SKIP live block-step/replay' "$log"; then
            echo "::notice::block-step/replay self-skipped (PTRACE_SINGLEBLOCK masked on this VM) — expected on GitHub runners; F1 inc 1 is gated on bare metal only."
          fi
          if grep -q '^# SKIP pt live replay' "$log"; then
            echo "::notice::F5 pt live replay self-skipped (no intel_pt PMU on this runner) — expected on GitHub/AMD; T4 is gated on bare-metal Intel PT only."
          fi
          if grep -q '^not ok' "$log"; then
            echo "::error::the data-flow C suite reported FAILING assertions:"
            grep '^not ok' "$log"
            exit 1
          fi
          # F1 increment 1 specifically: its lane self-skips without unicorn, and it was an
          # orphan (defined but never called) before being chained into dataflow-test. If this
          # banner is gone, the chain broke and the increment is unguarded again.
          if ! grep -q '^== dataflow-blockstep-test ==' "$log"; then
            echo "::error::dataflow-blockstep-test did not run — F1 increment 1 (block-step vs. the single-step oracle) is UNGATED. Check that dataflow-test still chains it (mk/dataflow.mk)."
            exit 1
          fi
          # A floor, not an exact count: new assertions should not break the gate, but a
          # truncated or half-run suite must not pass. On bare metal (Zen 5 box, `make
          # docker-dataflow-attach`) the 8 suites total 498, MEASURED 2026-07-18 (test_dataflow
          # 29, method 29, gcmove 26, helpers 36, operands 20, emu 10, ptrace 168, blockstep
          # 180). Two changes landed since this comment's prior 415/306: (1) blockstep's
          # 119 -> 180 (+61) is T4's undefined-EFLAGS masking work (dataflow-blockstep-test,
          # unrelated to this suite's own diff) — the ENTIRE block-step/replay slice already
          # self-skips as one named unit on a GitHub VM (BTF masked, see above), so this
          # growth does NOT raise the VM-side total; (2) test_dataflow's 23 -> 29 (+6) and
          # ptrace's 152 -> 168 (+16) are T3 (sub-register-aware last-writer resolution in
          # the shared builder, plus the zero-extension write-range fix and two new windowed
          # gap-barrier live fixtures): test_dataflow is pure (runs everywhere) and the new
          # ptrace fixtures drive PTRACE_SINGLESTEP, which the hypervisor does not mask, so
          # BOTH raise the VM total by the same +22 combined. VM total was last recorded
          # ~314 pre-T3; add +22 for ~336. The floor sits a few below that ON PURPOSE, tight
          # enough that even the smallest suite (emu's 10) vanishing trips it.
          n=$(grep -c '^ok ' "$log" || true)
          if [ "$n" -lt 328 ]; then
            echo "::error::the data-flow C suite ran only $n assertions, expected >= 328 — a suite is missing or the run was truncated."
            exit 1
          fi
          echo "data-flow C suite: $n assertions, no unexpected skips, block-step chain intact."

  # The remaining seven data-flow language bindings, each run in the pinned toolchain
  # image it was validated in (a `docker run` on the host runner — checkout stays on the
  # host so no in-container git is needed). Each `make dataflow-<lang>-test` builds
  # libasmtest_dataflow into /tmp/b and runs that language's 16-check smoke.
  dataflow-bindings:
    name: dataflow-bindings (${{ matrix.lang }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: ruby
            image: "ubuntu:24.04"
            setup: "apt-get update && apt-get install -y --no-install-recommends ruby build-essential libcapstone-dev pkg-config make"
          - lang: lua
            image: "ubuntu:24.04"
            setup: "apt-get update && apt-get install -y --no-install-recommends luajit build-essential libcapstone-dev pkg-config make"
          - lang: rust
            image: "rust:1-slim-bookworm"
            setup: "apt-get update && apt-get install -y --no-install-recommends build-essential libcapstone-dev pkg-config make"
          - lang: go
            image: "golang:1-bookworm"
            setup: "apt-get update && apt-get install -y --no-install-recommends build-essential libcapstone-dev pkg-config make"
          - lang: java
            image: "eclipse-temurin:23-jdk"
            setup: "apt-get update && apt-get install -y --no-install-recommends build-essential libcapstone-dev pkg-config make"
          - lang: dotnet
            image: "mcr.microsoft.com/dotnet/sdk:8.0"
            setup: "apt-get update && apt-get install -y --no-install-recommends build-essential libcapstone-dev pkg-config make"
          - lang: zig
            image: "ubuntu:24.04"
            setup: "apt-get update && apt-get install -y --no-install-recommends build-essential libcapstone-dev pkg-config make curl xz-utils ca-certificates && curl -fsSL https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz | tar -xJ -C /opt && export PATH=/opt/zig-linux-x86_64-0.13.0:$PATH"
    steps:
      - uses: actions/checkout@v7

      - name: Run the ${{ matrix.lang }} data-flow binding in ${{ matrix.image }}
        run: |
          docker run --rm -v "$PWD":/w -w /w -e HOME=/tmp \
            -e DOTNET_CLI_TELEMETRY_OPTOUT=1 -e DOTNET_NOLOGO=1 \
            ${{ matrix.image }} bash -c '
              set -e
              ${{ matrix.setup }}
              make BUILD=/tmp/b dataflow-${{ matrix.lang }}-test
            '

  # K2: the cross-language hardware-trace wrappers — each binding's in-process
  # single-step tracer, in the same isolated per-language images the `bindings`
  # job builds. Run as ONE job so the shared bindings base (and its Keystone /
  # Capstone source build) is built once via the in-job docker layer cache, not
  # once per language. python is excluded (HWTRACE_DOCKER_LANGS), matching the
  # single-step tier's Docker matrix. Needs no privilege (in-process TF/SIGTRAP);
  # each wrapper self-skips off x86-64 Linux. This is the tier's first CI lane
  # that actually executes a trace across the bindings, not just the C harness.
  hwtrace-bindings:
    name: hwtrace-bindings (all wrappers)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # K1: route the shared bindings-base image (whose Keystone+Capstone
      # source-build layer is the expensive part) through buildx with a
      # GitHub-Actions layer cache, scoped to that one image. Cold cache:
      # cache-from is a no-op; unavailable backend: ignore-error=true — the
      # caching can never fail the lane. See DOCKER_BASE_BUILD in mk/docker.mk.
      DOCKER_BASE_BUILD: >-
        docker buildx build --load
        --cache-from type=gha,scope=asmtest-bindings-base
        --cache-to type=gha,scope=asmtest-bindings-base,mode=max,ignore-error=true
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Expose the Actions runtime to buildx (gha cache backend)
        uses: actions/github-script@v9
        with:
          script: |
            for (const k of ['ACTIONS_CACHE_URL', 'ACTIONS_RESULTS_URL', 'ACTIONS_CACHE_SERVICE_V2', 'ACTIONS_RUNTIME_TOKEN']) {
              if (process.env[k]) core.exportVariable(k, process.env[k]);
            }
      - name: Trace every language wrapper (single-step; self-skips off x86-64 Linux)
        run: make docker-hwtrace-bindings
      - name: Forward-runtime drift check (.NET 9 — diagnostics IPC / MethodLoadVerbose)
        run: make docker-hwtrace-dotnet9
      # Sharpening 1 (managed-singlestep-lazy-arm-plan): the tiering worker UNPINNED on
      # the loaded runner — the exact environment where the old stepped-DynamicInvoke
      # Invoke died (exit 133, SIGTRAP force-killed inside pthread_create). Lazy-arm
      # must survive worker respawns adjacent to its armed windows, captures intact.
      - name: Slow-host crash-avoidance stress (tiering worker unpinned)
        run: make docker-hwtrace-dotnet-stress

  # K2: the eBPF code-image (JIT emission) detector — build the CO-RE program +
  # host harness and run it in a container with the BPF / PERFMON / SYS_PTRACE
  # caps the lane grants, exercising the mmap -> mprotect(PROT_EXEC) emission
  # edge. Self-skips cleanly where the kernel denies CAP_BPF.
  codeimage:
    name: codeimage (eBPF emission detector)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # K1: cached bindings-base build — see the hwtrace-bindings job's note.
      DOCKER_BASE_BUILD: >-
        docker buildx build --load
        --cache-from type=gha,scope=asmtest-bindings-base
        --cache-to type=gha,scope=asmtest-bindings-base,mode=max,ignore-error=true
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Expose the Actions runtime to buildx (gha cache backend)
        uses: actions/github-script@v9
        with:
          script: |
            for (const k of ['ACTIONS_CACHE_URL', 'ACTIONS_RESULTS_URL', 'ACTIONS_CACHE_SERVICE_V2', 'ACTIONS_RUNTIME_TOKEN']) {
              if (process.env[k]) core.exportVariable(k, process.env[k]);
            }
      - name: Build + run the eBPF code-image detector
        run: make docker-hwtrace-codeimage

  # K2: the privileged hardware-capture lane, run on GitHub's HOSTED (non-AMD)
  # runners. Runs `make docker-hwtrace-privileged`: the hwtrace image under
  # Docker's DEFAULT seccomp profile with --cap-add=PERFMON (which gates
  # perf_event_open on exactly that cap and bypasses kernel.perf_event_paranoid
  # — no seccomp=unconfined, no --privileged). On a non-AMD runner the AMD-exact
  # live tests (LbrExtV2 capture, sample_window survey, live IBS out-of-band +
  # whole-process survey) self-skip — they need Zen silicon (LbrExtV2 is Zen 4+;
  # live IBS is Zen 2+) — so here this lane validates that the target builds and
  # runs, the IBS-Op decoder + substrate/PMU detection execute, and the whole
  # detect-and-skip gating chain stays green. It goes RED only on a real
  # regression, never for lack of AMD silicon: this hosted copy is the
  # build/decode bitrot gate.
  #
  # The exact-AMD live paths now have a real CI home: the self-hosted lane
  # `hwtrace-privileged-zen` in .github/workflows/hw.yml runs this same target on
  # a registered Zen 4/5 runner and asserts the live paths RAN (a self-skip there
  # is a hard failure). Off that runner the residue is validated manually
  # pre-release — see docs/internal/amd-hardware-validation.md. The call_auto
  # non-escalation finding from
  # docs/internal/analysis/2026-07-12-zen5-privileged-lbr-findings.md was FIXED in
  # 5d8e0d2 (a non-escalation is now the regression signal that lane guards
  # against, not an open bug).
  hwtrace-privileged:
    name: hwtrace-privileged (PERFMON; AMD-exact self-skips off Zen)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # K1: cached bindings-base build — see the hwtrace-bindings job's note.
      DOCKER_BASE_BUILD: >-
        docker buildx build --load
        --cache-from type=gha,scope=asmtest-bindings-base
        --cache-to type=gha,scope=asmtest-bindings-base,mode=max,ignore-error=true
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Expose the Actions runtime to buildx (gha cache backend)
        uses: actions/github-script@v9
        with:
          script: |
            for (const k of ['ACTIONS_CACHE_URL', 'ACTIONS_RESULTS_URL', 'ACTIONS_CACHE_SERVICE_V2', 'ACTIONS_RUNTIME_TOKEN']) {
              if (process.env[k]) core.exportVariable(k, process.env[k]);
            }
      # --cap-add=PERFMON is a plain capability add (PERFMON is a Linux 5.8+
      # capability; Docker 20.10+ knows the name), and GitHub's runner Docker
      # accepts it: an unknown or kernel-absent cap is simply dropped from the
      # container bounding set, never a `docker run` failure. So this step cannot
      # go red for want of the cap. IBS decode + substrate detection run
      # regardless; the AMD-exact live capture self-skips off Zen.
      - name: Build + run the privileged capture lane (IBS decode + substrate; AMD-exact self-skips)
        run: make docker-hwtrace-privileged

  # Language wrappers (Tracks P/R/X/Z/N/J/D/C). Each is tested in its OWN
  # container (the generic bindings/Dockerfile.lang on a shared base) so the
  # toolchains stay isolated — one matrix job per language, `make docker-<lang>`,
  # which builds the per-language image and replays the conformance corpus inside
  # it. The shared base carries the full native tier (libunicorn + Keystone +
  # Capstone) because libasmtest_emu is the superset, so each job exercises the
  # in-line-assembler AND disassembler path end to end with no separate matrix —
  # asm_available()/disas_available() are true. (The host-arch struct layout the
  # bindings rely on is pinned by the C _Static_asserts, verified on arm64 by the
  # `test`/`emu` jobs; these wrapper jobs run on x86-64.)
  bindings:
    name: bindings (${{ matrix.lang }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        lang: [python, cpp, rust, zig, node, java, dotnet, ruby, lua, go]
    env:
      # K1: cached bindings-base build — see the hwtrace-bindings job's note.
      # One scope for the one shared image, reused by all ten matrix legs.
      DOCKER_BASE_BUILD: >-
        docker buildx build --load
        --cache-from type=gha,scope=asmtest-bindings-base
        --cache-to type=gha,scope=asmtest-bindings-base,mode=max,ignore-error=true
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Expose the Actions runtime to buildx (gha cache backend)
        uses: actions/github-script@v9
        with:
          script: |
            for (const k of ['ACTIONS_CACHE_URL', 'ACTIONS_RESULTS_URL', 'ACTIONS_CACHE_SERVICE_V2', 'ACTIONS_RUNTIME_TOKEN']) {
              if (process.env[k]) core.exportVariable(k, process.env[k]);
            }
      - name: Test the ${{ matrix.lang }} binding in its isolated image
        run: make docker-${{ matrix.lang }}

  # Clean-room install test (docs/internal/plans/macos-clean-test-plan.md, Track A). For each
  # binding that BUNDLES a native payload, package it, install it FRESH into a
  # throwaway prefix, and — with every ASMTEST_*/DYLD_*/LD_* override scrubbed and the
  # cwd outside the checkout — assert the native lib it resolved came from that install,
  # never a leaked dev build/ tree, a Homebrew dylib, or /usr/local. Runs in each
  # language's isolated image (`make docker-clean-<lang>`, run with CLEANROOM_ONLY=<lang>
  # so the run FAILS if that binding self-skips — a missing toolchain can't pass
  # vacuously), so "install fresh, no ASMTEST_LIB" is proven rather than trusted. python
  # is covered by the release.yml python job (asserts on the repaired wheel). The link
  # bindings (cpp/rust/go/zig) ship source with no bundled payload, so they are out of
  # scope. Complements the conformance replay above (which loads the dev build/ tree).
  clean-room:
    name: clean-room (${{ matrix.lang }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        lang: [ruby, node, java, dotnet, lua]
    env:
      # K1: cached bindings-base build — see the hwtrace-bindings job's note.
      DOCKER_BASE_BUILD: >-
        docker buildx build --load
        --cache-from type=gha,scope=asmtest-bindings-base
        --cache-to type=gha,scope=asmtest-bindings-base,mode=max,ignore-error=true
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Expose the Actions runtime to buildx (gha cache backend)
        uses: actions/github-script@v9
        with:
          script: |
            for (const k of ['ACTIONS_CACHE_URL', 'ACTIONS_RESULTS_URL', 'ACTIONS_CACHE_SERVICE_V2', 'ACTIONS_RUNTIME_TOKEN']) {
              if (process.env[k]) core.exportVariable(k, process.env[k]);
            }
      - name: Clean-room install-test the ${{ matrix.lang }} binding
        run: make docker-clean-${{ matrix.lang }}

  # Binding function-surface parity: every language binding must wrap every symbol
  # in the native-trace tier headers (asmtest_hwtrace.h / asmtest_drtrace.h), so a
  # contract change can't reach nine bindings and silently miss the tenth. Pure
  # git-grep over headers + binding sources — no toolchain, no build — so it is a
  # fast gate that complements the per-language conformance replay above.
  bindings-parity:
    name: bindings (function-surface parity)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Check every binding manifest matches VERSION
        # Catch a VERSION bump made without `make sync-version` here, instead of
        # only when the release workflow's packaging steps explode on a real tag.
        run: make check-version
      - name: Check pinned third-party engine versions are consistent
        # DynamoRIO/Keystone/Capstone versions must agree across the Make layer,
        # CI, the Dockerfiles, and the GPL corresponding-source script (B3/B4).
        run: sh scripts/check-thirdparty-versions.sh
      - name: Check every binding wraps every native-trace tier symbol
        run: make check-bindings-parity

  # `go vet` on every push — NOT only on a release dispatch.
  #
  # This job exists because of a real miss: 16 "possible misuse of unsafe.Pointer"
  # sites accumulated in bindings/go and nobody saw them, because vet ran ONLY in
  # release.yml and release.yml had not been dispatched since 2026-06-26. The cgo
  # shims typed foreign-process/JIT addresses as `const void *`, forcing the Go side
  # to fabricate an unsafe.Pointer from a uintptr; vet was right to object.
  #
  # `go-version: stable` deliberately MATCHES release.yml. The docker binding lane
  # uses apt's golang-go (Go 1.22.2, mk/docker.mk), which is old enough that it does
  # not flag this class at all — so that lane structurally cannot substitute for this
  # one, and pinning an older version here would recreate the blind spot.
  #
  # Note vet is necessary but NOT sufficient: truncating one of those casts to 32
  # bits still vets clean AND still builds, and is caught only by the Go binding's
  # own base-equality test. Keep both.
  go-vet:
    name: go (vet + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: "stable" }
      # libasmtest_emu is the superset the cgo module links against; Keystone has no
      # apt package, so both pinned engines are built from source (as release.yml does).
      - run: make deps DEPS_ARGS=--asm
      - run: ./scripts/build-keystone.sh && ./scripts/build-capstone.sh && make shared-emu
      - name: go vet + build
        run: |
          cd bindings/go
          CGO_LDFLAGS="-L$GITHUB_WORKSPACE/build" go vet ./...
          CGO_LDFLAGS="-L$GITHUB_WORKSPACE/build" go build ./...

  # Native Win64 tier (see docs/internal/archive/plans/win64-native-tier-plan.md). The Microsoft
  # x64 capture trampoline is exercised two ways on x86-64 with no Windows host:
  # the fast native lane via __attribute__((ms_abi)) on the runner itself, then a
  # real Win64 PE (mingw-w64 + `nasm -f win64`) run under Wine in an isolated
  # image. Both replay the same capture suite (return/FP/vector capture, shadow
  # space, and GP + xmm6..15 ABI-preservation), which doubles as the native
  # Win64 conformance check.
  win64:
    name: win64 (capture trampoline)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Win64 capture via the native ms_abi lane
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends nasm
          make win64-msabi-test

      - name: Win64 capture as a real PE under Wine
        run: make docker-win64

  # Optional real-Windows sign-off (Track B): the SAME integrated Win64 runner
  # suite the `win64` job runs under Wine, here on a genuine Windows host with NO
  # Wine — the authoritative check behind the Wine-fidelity caveat in
  # docs/win64.md. Builds the PE with MSYS2 mingw gcc + nasm and runs it natively
  # (WINE= makes the targets invoke the .exe directly), exercising all four
  # execution modes: per-test re-exec isolation, the -jN pool, in-process
  # --no-fork, and --bench. Kept thin — Wine carries the bulk in `win64`.
  windows:
    name: win64 (real Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v7
      - uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2.32.0
        with:
          msystem: MINGW64
          update: true
          install: make nasm coreutils mingw-w64-x86_64-gcc
      - name: Build + run the Win64 runner suite natively (no Wine)
        run: make win64-runner-test WIN64_CC=gcc WINE=
      - name: VEH single-step front-end on real Windows (no Wine)
        run: make win64-ss-test WIN64_CC=gcc WINE=

  # Quality: AddressSanitizer + UndefinedBehaviorSanitizer over the suites and
  # the framework self-tests (full ASan + UBSan + LeakSanitizer on Linux).
  sanitize:
    name: sanitize (asan+ubsan)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      # libunicorn (+ capstone) so `make sanitize` also instruments the emulator
      # tier; the hwtrace single-step tier builds/runs with no extra dep, and
      # codeimage self-skips here (no bpftool). See the sanitize target (K4).
      - name: Install the emulator tier deps
        run: make deps DEPS_ARGS=--emu
      - name: Build and run under sanitizers
        run: make sanitize

  # Quality: memcheck the routines under test (Track E). Runs the example suites
  # under Valgrind (--no-fork) to catch bad loads/stores, uninitialized reads,
  # and leaks in the assembly routines; gates on --error-exitcode. x86-64 Linux
  # (Valgrind isn't available on current macOS/arm64 runners).
  valgrind:
    name: valgrind (memcheck)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Install valgrind
        run: make deps DEPS_ARGS=--valgrind
      - name: Memcheck the routines under test
        run: make valgrind

  # Quality: static analysis with clang-tidy (checks curated in .clang-tidy).
  # Informational — reports a baseline without gating (no --warnings-as-errors).
  analyze:
    name: analyze (clang-tidy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      # clang-tidy, plus libunicorn (+ capstone) so tidy also analyzes the
      # emulator and disassembler tiers, not just the base group (K3). The
      # keystone / libipt / OpenCSD tiers self-skip (their libs aren't installed).
      - name: Install clang-tidy + emulator tier deps
        run: make deps DEPS_ARGS="--tidy --emu"
      - name: Run clang-tidy
        run: make tidy

  # Quality: clang-format drift (style in .clang-format). A GATE since the
  # one-shot `make fmt` pass (e32a12f) brought the tree clean — new drift now
  # fails the run. Fix with `make fmt` / `make docker-fmt`. Pinned to
  # clang-format-18 to match `make docker-fmt`'s ubuntu:24.04 (== 18.1.3): the
  # canonical formatting is 18's, so an unpinned distro clang-format would flag the
  # whole (clean) tree as drift the day GitHub bumps ubuntu-latest past 24.04.
  format:
    name: format (clang-format)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Install clang-format 18 (pinned; matches make docker-fmt)
        run: sudo apt-get update && sudo apt-get install -y clang-format-18
      - name: Report clang-format drift
        run: make fmt-check CLANG_FORMAT=clang-format-18

  # Quality: the documentation site builds warnings-as-errors (SPHINXOPTS=-W, same
  # as Read the Docs' fail_on_warning), so a broken cross-reference / bad {term} /
  # malformed directive fails the PR in-repo instead of only reddening RTD after
  # merge. HTML only (mermaid-cli is a PDF-build dep); mirrors .readthedocs.yaml.
  docs:
    name: docs (sphinx -W)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install the docs toolchain
        run: pip install -r docs/requirements.txt
      - name: Build the HTML docs (warnings-as-errors)
        run: make docs

  # Quality: coverage of the runner (src/asmtest.c), surfaced as an artifact.
  # Informational, not a gate.
  coverage:
    name: coverage (gcov)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      # libunicorn (+ capstone) so coverage spans the emulator tier too, not just
      # the runner (K3).
      - name: Install the emulator tier deps
        run: make deps DEPS_ARGS=--emu
      - name: Generate coverage
        run: make coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: asmtest-coverage
          path: "*.gcov"
          if-no-files-found: error

  # Release payloads: build the prebuilt native libraries per OS/arch and upload
  # each as an artifact, so a publish step ships a *cross-platform* native set
  # without a registry credential or a per-ecosystem prebuild tool living in this
  # repo. `make package-libs` stages the build host's slot (libasmtest + the
  # libasmtest_emu superset the dlopen bindings load) into build/dist/native/
  # <os>-<arch>/; this matrix runs it on the same {x86-64, AArch64} x {Linux,
  # macOS} platforms the `test` job covers. The scarce/slow Intel macOS corner
  # builds nightly in `package-libs-macos-x86`; `package-libs-collect` merges every
  # leg's artifact into one tree and verifies each platform carries both libs.
  # This is the "multi-platform native payloads" step the packaging scaffolding
  # stopped short of (see docs/packaging.md) — credentialed publish stays out.
  package-libs:
    name: payloads (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Install build deps (unicorn, pkg-config) + patchelf + tier deps
        run: |
          make deps DEPS_ARGS=--asm
          # Linux slots bundle the native-trace tiers: patchelf (rpath), cmake (the
          # DynamoRIO client), libipt/OpenCSD (hwtrace "full"). DynamoRIO auto-fetches.
          # `if` (not `&& … || true`) so a genuine Linux apt failure fails the step
          # rather than silently shipping hwtrace without PT/CoreSight decoders. libipt
          # (Intel PT decode) is x86-only — no libipt-dev exists on Ubuntu ports/arm64,
          # so install it only on x86_64 and keep OpenCSD (CoreSight) on both.
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get install -y patchelf cmake libopencsd-dev
            if [ "$(uname -m)" = "x86_64" ]; then sudo apt-get install -y libipt-dev; fi
          fi

      # K1: cache both pinned source builds' exact installed file sets. Cold
      # cache / unavailable backend: builds from source exactly as before.
      - name: Cache the pinned Keystone source build (K1)
        uses: actions/cache@v6
        with:
          path: ~/.cache/asmtest-thirdparty/keystone
          key: tp-keystone-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/build-keystone.sh', 'scripts/lib-thirdparty.sh', 'scripts/third-party-digests.txt', 'scripts/thirdparty-cache.sh') }}

      - name: Cache the pinned Capstone source build (K1)
        uses: actions/cache@v6
        with:
          path: ~/.cache/asmtest-thirdparty/capstone
          key: tp-capstone-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/build-capstone.sh', 'scripts/lib-thirdparty.sh', 'scripts/third-party-digests.txt', 'scripts/thirdparty-cache.sh') }}

      - name: Build Keystone + Capstone from source (pinned optional tiers)
        run: sh scripts/thirdparty-cache.sh cached-build keystone capstone   # restores from the cache when warm

      - name: Stage the host's native payload (superset + vendored deps + tiers + licenses)
        run: make package-libs

      - name: Upload native payload
        uses: actions/upload-artifact@v7
        with:
          name: native-payload-${{ matrix.os }}
          path: build/dist/native/
          if-no-files-found: error

  # The Intel macOS (darwin-x86_64) payload, nightly + on manual dispatch, exactly
  # as the `test-macos-x86` job gates that scarce/slow corner off the per-push path.
  package-libs-macos-x86:
    name: payloads (macos-15-intel, nightly)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-15-intel
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Install build deps (unicorn, pkg-config) + patchelf
        run: |
          make deps DEPS_ARGS=--asm
          [ "$RUNNER_OS" = "Linux" ] && sudo apt-get install -y patchelf || true

      # K1: same pinned-build caches as the main package-libs matrix above.
      - name: Cache the pinned Keystone source build (K1)
        uses: actions/cache@v6
        with:
          path: ~/.cache/asmtest-thirdparty/keystone
          key: tp-keystone-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/build-keystone.sh', 'scripts/lib-thirdparty.sh', 'scripts/third-party-digests.txt', 'scripts/thirdparty-cache.sh') }}

      - name: Cache the pinned Capstone source build (K1)
        uses: actions/cache@v6
        with:
          path: ~/.cache/asmtest-thirdparty/capstone
          key: tp-capstone-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/build-capstone.sh', 'scripts/lib-thirdparty.sh', 'scripts/third-party-digests.txt', 'scripts/thirdparty-cache.sh') }}

      - name: Build Keystone + Capstone from source (pinned optional tiers)
        run: sh scripts/thirdparty-cache.sh cached-build keystone capstone   # restores from the cache when warm

      - name: Stage the host's native payload (superset + vendored deps + licenses)
        run: make package-libs

      - name: Upload native payload
        uses: actions/upload-artifact@v7
        with:
          name: native-payload-macos-15-intel
          path: build/dist/native/
          if-no-files-found: error

  # Gather every per-OS/arch payload into one build/dist/native/ tree and verify
  # the cross-platform set is complete (each platform carries the core + emu lib),
  # then re-upload it as a single `native-all` artifact a release would consume.
  # `needs` the optional Intel-macOS leg too, but the `if` keys only off the main
  # matrix so this still runs on push (where that leg is skipped) — the download
  # pattern simply collects whatever payload artifacts the run produced.
  package-libs-collect:
    name: payloads (collect + verify)
    needs: [package-libs, package-libs-macos-x86]
    if: ${{ !cancelled() && needs.package-libs.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Download every per-OS/arch payload
        uses: actions/download-artifact@v8
        with:
          pattern: native-payload-*
          path: build/dist/native/
          merge-multiple: true

      # llvm-otool / llvm-lipo drive the static Mach-O assertions on the darwin payloads
      # (package-libs-verify-macho, folded into package-libs-verify) — no macOS needed.
      - name: Install llvm (Mach-O inspection tools)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends llvm

      - name: Verify the cross-platform native set
        run: make package-libs-verify

      - name: Upload the combined cross-platform payload
        uses: actions/upload-artifact@v7
        with:
          name: native-all
          path: build/dist/native/
          if-no-files-found: error

  # System-package build+install lanes (distribution-packaging.md T13). Each
  # manager's spec under packaging/ is built, linted, installed and consumed in a
  # container (make docker-syspkg-<mgr>). Hermetic: every lane stages the
  # reproducible make-package-source tarball, so no registry/network fetch of the
  # source. The MIT C core only — no GPL engines are conveyed.
  syspkg:
    name: syspkg (${{ matrix.mgr }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        mgr: [brew, deb, aur, vcpkg, conan]
    steps:
      - uses: actions/checkout@v7
      - name: system-package build + install lane
        run: make docker-syspkg-${{ matrix.mgr }}

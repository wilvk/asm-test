# Read the Docs configuration file.
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details.

# Required
version: 2

# Set the OS and Python version used to build the docs.
build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
    # Node.js is only needed by the PDF (LaTeX) builder: the HTML and ePub
    # builders render mermaid diagrams client-side, but LaTeX rasterizes each
    # one with the Mermaid CLI (`mmdc`), which is an npm package.
    nodejs: "20"
  jobs:
    # Install the Mermaid CLI so `mmdc` is on PATH for the PDF build. It drives a
    # headless Chromium via Puppeteer; docs/puppeteer-config.json passes
    # --no-sandbox (required in the RTD build container). If a future PDF build
    # fails on a missing Chromium shared library, add it under build.apt_packages.
    post_install:
      - npm install -g @mermaid-js/mermaid-cli

# Build the documentation in the "docs/" directory with Sphinx.
sphinx:
  configuration: docs/conf.py
  # Turn warnings (e.g. broken cross-references) into build failures.
  fail_on_warning: true

# Install the Python requirements needed to build the documentation.
# See https://docs.readthedocs.io/en/stable/guides/reproducible-builds.html
python:
  install:
    - requirements: docs/requirements.txt

# Also publish a downloadable PDF and ePub alongside the HTML.
formats:
  - pdf
  - epub

# Read the Docs configuration file.
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details.

# Required
version: 2

# Set the OS and Python version used to build the docs.
build:
  os: ubuntu-24.04
  tools:
    python: "3.13"

# Build the documentation in the "docs/" directory with Sphinx.
sphinx:
  configuration: docs/conf.py
  # Turn warnings (e.g. broken cross-references) into build failures.
  fail_on_warning: true

# Install the Python requirements needed to build the documentation.
# See https://docs.readthedocs.io/en/stable/guides/reproducible-builds.html
python:
  install:
    - requirements: docs/requirements.txt

# Also publish a downloadable PDF and ePub alongside the HTML.
formats:
  - pdf
  - epub
